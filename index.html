const CARGOS_LIDERANCA = ['Líder de equipe', 'Supervisor', 'Gerente', 'Supervisor administrativo', 'Gerente administrativo'];

function ehLideranca(cargo) { return CARGOS_LIDERANCA.includes(cargo); }

/* =========================================================================
   2. LÓGICA DE CÁLCULO E RECOMENDAÇÃO
   ========================================================================= */

function calcularMedia(avaliacao) {
  const v = Object.values(avaliacao.criterios || {}).filter(n => typeof n === 'number');
  if (!v.length) return 0;
  return v.reduce((a,b) => a+b, 0) / v.length;
}

function gerarRecomendacao(media, cargoAtual) {
  const proximo = CARGOS[cargoAtual]?.proximo;
  if (media < 2.5)  return {
    nivel: 'PRD', titulo: 'Plano de Recuperação de Desempenho',
    cor: 'bg-red-700 text-white',
    acao: 'Acompanhamento intensivo por 60 dias. Avaliar fit do colaborador no cargo. Reunião urgente com o gestor direto.',
  };
  if (media < 3.5) return {
    nivel: 'DEV', titulo: 'Em desenvolvimento',
    cor: 'bg-amber-500 text-bordo',
    acao: 'Plano de treinamento direcionado nos pontos fracos. Reavaliação em 90 dias.',
  };
  if (media < 4.3) return {
    nivel: 'OK', titulo: 'Cumpre o esperado',
    cor: 'bg-green-600 text-white',
    acao: 'Mantém funções atuais. Continuar capacitação contínua. Reavaliação em 6 meses.',
  };
  if (media < 4.8) return {
    nivel: 'EXP', titulo: 'Pronto para novas responsabilidades',
    cor: 'bg-azulCDB text-bordo',
    acao: `Candidato a expansão de escopo. ${proximo ? 'Iniciar shadow do cargo de ' + proximo + '.' : 'Liderar projetos estratégicos da rede.'}`,
  };
  return {
    nivel: 'PROMO', titulo: 'Pronto para promoção',
    cor: 'bg-amarelo text-bordo',
    acao: proximo
      ? `Promover para ${proximo} na próxima janela. Iniciar plano de transição de 30 dias.`
      : 'Topo da trilha. Considerar bonificação, projetos estratégicos ou expansão regional.',
  };
}

function classificarPontos(avaliacao, cargo) {
  const todos = [...CRITERIOS_UNIVERSAIS, ...(CARGOS[cargo]?.criterios || [])];
  const itens = todos.map(c => ({
    id: c.id, label: c.label,
    nota: avaliacao.criterios?.[c.id] ?? null,
  })).filter(x => x.nota !== null);
  const fortes = [...itens].filter(i => i.nota >= 4).sort((a,b) => b.nota - a.nota).slice(0, 5);
  const fracos = [...itens].filter(i => i.nota <= 3).sort((a,b) => a.nota - b.nota).slice(0, 5);
  return { fortes, fracos };
}

/* =========================================================================
   3. STORAGE E ESTADO GLOBAL
   ========================================================================= */

const STORAGE_KEY = 'cdb_desempenho_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { colaboradores: [] };
    const parsed = JSON.parse(raw);
    return parsed && parsed.colaboradores ? parsed : { colaboradores: [] };
  } catch {
    return { colaboradores: [] };
  }
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function tempoCasa(dataInicio) {
  if (!dataInicio) return '—';
  const d = new Date(dataInicio);
  if (isNaN(d)) return '—';
  const hoje = new Date();
  let anos = hoje.getFullYear() - d.getFullYear();
  let meses = hoje.getMonth() - d.getMonth();
  if (hoje.getDate() < d.getDate()) meses--;
  if (meses < 0) { anos--; meses += 12; }
  if (anos === 0 && meses === 0) return 'menos de 1 mês';
  if (anos === 0) return `${meses} ${meses === 1 ? 'mês' : 'meses'}`;
  if (meses === 0) return `${anos} ${anos === 1 ? 'ano' : 'anos'}`;
  return `${anos}a ${meses}m`;
}

function Bar({ value, max=5 }) {
  const pct = (value / max) * 100;
  let color = '#CC0000';

  else if (value >= 3.5) color = '#FECF23';
  return (
    <div className="w-full bg-cinzaCDB rounded-full h-2 overflow-hidden">
      <div style={{ width: `${pct}%`, background: color }} className="h-full transition-all"></div>

/* =========================================================================
   6. PÁGINA: DASHBOARD
   ========================================================================= */

function Dashboard({ state, setTab, setSelectedId }) {
  const colabs = state.colaboradores.filter(c => c.ativo !== false);
  const total = colabs.length;

  const todasAvaliacoes = colabs.flatMap(c => (c.avaliacoes || []).map(a => ({ ...a, colab: c })));
  const ultimoMes = new Date(); ultimoMes.setDate(ultimoMes.getDate() - 30);
  const avaliacoesMes = todasAvaliacoes.filter(a => new Date(a.data) >= ultimoMes).length;

  const ultimaPorColab = colabs.map(c => {
    const av = (c.avaliacoes || []).slice().sort((a,b) => new Date(b.data) - new Date(a.data))[0];
    return { c, ultima: av };
  });

  const promo  = ultimaPorColab.filter(x => x.ultima && calcularMedia(x.ultima) >= 4.8).length;
  const prd    = ultimaPorColab.filter(x => x.ultima && calcularMedia(x.ultima) < 2.5).length;
  const semAv  = ultimaPorColab.filter(x => !x.ultima).length;

  const noventaDias = new Date(); noventaDias.setDate(noventaDias.getDate() - 90);
  const atrasados = ultimaPorColab.filter(x => x.ultima && new Date(x.ultima.data) < noventaDias).length;

  const autoPendentes = colabs.filter(c => c.autoAvaliacaoPendente);

  const top = [...ultimaPorColab]
    .filter(x => x.ultima)
    .map(x => ({ ...x, media: calcularMedia(x.ultima) }))
    .sort((a,b) => b.media - a.media)
    .slice(0,5);

  const atencao = [...ultimaPorColab]
    .filter(x => x.ultima)
    .map(x => ({ ...x, media: calcularMedia(x.ultima) }))
    .filter(x => x.media < 3.5)
    .sort((a,b) => a.media - b.media)
    .slice(0,5);

  return (
    <div className="max-w-6xl mx-auto px-4 py-6 space-y-6">
      <div className="flex items-end justify-between flex-wrap gap-3">
        <div>
          <h1 className="font-display text-5xl text-bordo">PAINEL DE DESEMPENHO</h1>
          <p className="text-bordo/70 font-semibold">Visão geral da operação — Cachorro do Bigode</p>
        </div>
        <button onClick={() => setTab('avaliar')}
          className="bg-vermelho hover:bg-bordo text-amarelo font-display text-xl px-5 py-3 rounded-xl tracking-wider shadow-md">
          + NOVA AVALIAÇÃO
        </button>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <Stat label="Colaboradores"      value={total}         accent="bg-bordo" />
        <Stat label="Avaliações 30d"     value={avaliacoesMes} accent="bg-vermelho" />
        <Stat label="Prontos p/ promoção" value={promo}        accent="bg-amarelo" />
        <Stat label="Em PRD"             value={prd}           accent="bg-red-700" />
        <Stat label="Sem avaliação 90d"  value={atrasados + semAv} accent="bg-azulCDB" />
      </div>

      {autoPendentes.length > 0 && (
        <div className="bg-azulCDB/15 border-l-4 border-azulCDB rounded-r-xl p-4">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div>
              <div className="font-display text-xl text-bordo">👤 {autoPendentes.length} AUTO-AVALIAÇÃO(ÕES) PENDENTE(S)</div>
              <p className="text-sm text-bordo/80">
                {autoPendentes.map(c => c.nome).join(', ')} já preencheram. Aguardando sua avaliação oficial pra fechar o ciclo.
              </p>
            </div>
            <button onClick={() => setTab('avaliar')}
              className="bg-azulCDB text-bordo font-display px-4 py-2 rounded-xl tracking-wider">
              FECHAR CICLO
            </button>
          </div>
        </div>
      )}

      <div className="grid md:grid-cols-2 gap-6">
        <section className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
          <h2 className="font-display text-2xl text-bordo mb-3">🏆 TOP PERFORMERS</h2>
          {top.length === 0 ? (
            <p className="text-bordo/60">Sem avaliações ainda. Bora começar?</p>
          ) : top.map(x => (
            <button key={x.c.id} onClick={() => { setSelectedId(x.c.id); setTab('colab'); }}
              className="w-full flex items-center justify-between py-2 border-b border-bordo/10 hover:bg-cinzaCDB rounded transition">
              <div className="text-left">
                <div className="font-bold text-bordo">{x.c.nome}</div>
                <div className="text-xs text-bordo/60">{x.c.cargo}</div>
              </div>
              <div className="font-display text-2xl text-vermelho">{x.media.toFixed(1)}</div>

          ))}
        </section>

        <section className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
          <h2 className="font-display text-2xl text-bordo mb-3">⚠️ MERECEM ATENÇÃO</h2>
          {atencao.length === 0 ? (
            <p className="text-bordo/60">Ninguém em atenção. 🌭</p>
          ) : atencao.map(x => (

              className="w-full flex items-center justify-between py-2 border-b border-bordo/10 hover:bg-cinzaCDB rounded transition">
              <div className="text-left">
                <div className="font-bold text-bordo">{x.c.nome}</div>
                <div className="text-xs text-bordo/60">{x.c.cargo}</div>
              </div>
              <div className="font-display text-2xl" style={{ color: x.media < 2.5 ? '#7F1D1D' : '#CC0000' }}>{x.media.toFixed(1)}</div>
            </button>
          ))}
        </section>
      </div>
    </div>
  );
}

/* =========================================================================
   7. PÁGINA: LISTA / DETALHE DE COLABORADORES
   ========================================================================= */

function ListaColaboradores({ state, dispatch, selectedId, setSelectedId, setTab }) {
  const [busca, setBusca] = useState('');
  const [filtroCargo, setFiltroCargo] = useState('todos');
  const [showForm, setShowForm] = useState(false);

  const lista = state.colaboradores
    .filter(c => c.ativo !== false)
    .filter(c => filtroCargo === 'todos' || c.cargo === filtroCargo)
    .filter(c => c.nome.toLowerCase().includes(busca.toLowerCase()));

  const sel = state.colaboradores.find(c => c.id === selectedId);

  if (sel) {
    return <DetalheColaborador
      colab={sel} state={state} dispatch={dispatch}
      voltar={() => setSelectedId(null)}
      setTab={setTab}
    />;
  }

  return (
    <div className="max-w-6xl mx-auto px-4 py-6 space-y-4">
      <div className="flex items-end justify-between flex-wrap gap-3">
        <h1 className="font-display text-5xl text-bordo">COLABORADORES</h1>
        <button onClick={() => setShowForm(true)}
          className="bg-vermelho hover:bg-bordo text-amarelo font-display text-xl px-5 py-3 rounded-xl tracking-wider shadow-md">
          + CADASTRAR
        </button>
      </div>

      <div className="flex flex-wrap gap-2">
        <input type="text" placeholder="Buscar por nome..."
          value={busca} onChange={e => setBusca(e.target.value)}
          className="flex-1 min-w-[200px] px-4 py-2 rounded-xl border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
        <select value={filtroCargo} onChange={e => setFiltroCargo(e.target.value)}
          className="px-4 py-2 rounded-xl border-2 border-bordo/20 focus:border-vermelho focus:outline-none bg-white font-semibold text-bordo">
          <option value="todos">Todos os cargos</option>
          {CARGO_LISTA.map(c => <option key={c} value={c}>{c}</option>)}

      </div>

      {lista.length === 0 ? (
        <div className="bg-white rounded-2xl border-2 border-dashed border-bordo/20 p-10 text-center">
          <p className="font-display text-2xl text-bordo">NENHUM COLABORADOR AINDA</p>
          <p className="text-bordo/60 mt-2">Cadastra o primeiro pra começar.</p>
        </div>
      ) : (
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {lista.map(c => {
            const ultima = (c.avaliacoes || []).slice().sort((a,b) => new Date(b.data)-new Date(a.data))[0];
            const media = ultima ? calcularMedia(ultima) : null;
            return (
              <button key={c.id} onClick={() => setSelectedId(c.id)}
                className="bg-white rounded-2xl border-2 border-bordo/10 p-4 text-left hover:border-vermelho hover:shadow-lg transition">
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="font-display text-xl text-bordo truncate">{c.nome}</div>
                    <div className="text-sm text-bordo/70 font-semibold">{c.cargo}</div>
                    {c.unidade && <div className="text-xs text-bordo/50">📍 {c.unidade}</div>}
                  </div>
                  {media !== null && (
                    <div className="text-right">
                      <div className="font-display text-3xl text-vermelho">{media.toFixed(1)}</div>
                      <div className="text-[10px] text-bordo/60 uppercase">última nota</div>
                    </div>
                  )}
                </div>
                <div className="mt-3 flex items-center justify-between text-xs text-bordo/60">
                  <span>🗓️ {tempoCasa(c.dataInicio)} de casa</span>
                  <div className="flex items-center gap-2">
                    {c.autoAvaliacaoPendente && <span className="bg-azulCDB/30 text-bordo px-2 py-0.5 rounded font-bold">👤 auto</span>}
                    <span>{(c.avaliacoes || []).length} aval.</span>
                  </div>
                </div>
              </button>
            );
          })}

      )}

      {showForm && <FormColaborador

      />}

}

function FormColaborador({ onClose, onSave, colab }) {
  const [nome, setNome] = useState(colab?.nome || '');
  const [cargo, setCargo] = useState(colab?.cargo || CARGO_LISTA[0]);
  const [dataInicio, setDataInicio] = useState(colab?.dataInicio || '');
  const [unidade, setUnidade] = useState(colab?.unidade || '');
  const [cpf, setCpf] = useState(colab?.cpf || '');

  const salvar = () => {
    if (!nome.trim()) { alert('Informa o nome.'); return; }
    if (!dataInicio) { alert('Informa a data de início.'); return; }
    onSave({
      id: colab?.id || uid(),
      nome: nome.trim(), cargo, dataInicio, unidade: unidade.trim(), cpf: cpf.trim(),
      ativo: colab?.ativo ?? true,
      avaliacoes: colab?.avaliacoes || [],
      criadoEm: colab?.criadoEm || new Date().toISOString(),
    });
  };

  return (
    <div className="fixed inset-0 bg-bordo/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4">
      <div className="bg-white rounded-t-3xl md:rounded-2xl max-w-lg w-full p-6 pop-in">
        <h2 className="font-display text-3xl text-bordo">{colab ? 'EDITAR' : 'CADASTRAR'} COLABORADOR</h2>
        <div className="space-y-3 mt-4">
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Nome completo *</label>
            <input value={nome} onChange={e => setNome(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
          </div>
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Cargo *</label>
            <select value={cargo} onChange={e => setCargo(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none bg-white">
              {CARGO_LISTA.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs uppercase font-bold text-bordo/70">Data de início *</label>
              <input type="date" value={dataInicio} onChange={e => setDataInicio(e.target.value)}
                className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
            </div>
            <div>
              <label className="text-xs uppercase font-bold text-bordo/70">Unidade</label>
              <input value={unidade} onChange={e => setUnidade(e.target.value)} placeholder="ex: Cidade Baixa"
                className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
            </div>
          </div>
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">CPF (opcional)</label>
            <input value={cpf} onChange={e => setCpf(e.target.value)} placeholder="000.000.000-00"
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
          </div>
        </div>
        <div className="flex gap-2 mt-6">
          <button onClick={onClose} className="flex-1 py-3 rounded-xl border-2 border-bordo text-bordo font-display tracking-wider">CANCELAR</button>
          <button onClick={salvar} className="flex-1 py-3 rounded-xl bg-vermelho text-amarelo font-display tracking-wider">SALVAR</button>
        </div>
      </div>
    </div>
  );
}

/* -------------------------------------------------------------------------
   AUTO-AVALIAÇÃO (somente cargos de liderança)
   O colaborador preenche em primeira pessoa antes da reunião com o gestor.
   Fica como `autoAvaliacaoPendente` até ser consumida pela próxima avaliação.
   ------------------------------------------------------------------------- */

function AutoAvaliacaoModal({ colab, onClose, dispatch }) {
  const [criterios, setCriterios] = useState(colab.autoAvaliacaoPendente?.criterios || {});
  const [observacoes, setObservacoes] = useState(colab.autoAvaliacaoPendente?.observacoes || '');
  const [data] = useState(new Date().toISOString().slice(0, 10));

  const todos = [...CRITERIOS_UNIVERSAIS, ...(CARGOS[colab.cargo]?.criterios || [])];
  const preenchidos = todos.filter(c => criterios[c.id] !== undefined).length;
  const pct = todos.length ? Math.round((preenchidos / todos.length) * 100) : 0;
  const mediaParcial = preenchidos > 0
    ? Object.values(criterios).filter(n => typeof n === 'number').reduce((a,b) => a+b, 0) / preenchidos
    : 0;

  const setNota = (id, nota) => setCriterios(prev => ({ ...prev, [id]: nota }));

  const salvar = () => {
    if (preenchidos < todos.length) {
      if (!confirm(`Faltam ${todos.length - preenchidos} critérios sem nota. Salvar mesmo assim?`)) return;
    }
    const auto = {
      id: uid(),
      data,
      cargoNaEpoca: colab.cargo,
      criterios: { ...criterios },
      observacoes: observacoes.trim(),
      criadaEm: new Date().toISOString(),
    };
    dispatch({ type: 'SAVE_AUTO', colabId: colab.id, payload: auto });
    onClose();
  };

  const descartar = () => {
    if (!confirm('Descartar esta auto-avaliação?')) return;
    dispatch({ type: 'CLEAR_AUTO', colabId: colab.id });
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-bordo/70 z-50 flex items-start justify-center p-0 md:p-4 overflow-y-auto">
      <div className="bg-white rounded-2xl max-w-3xl w-full my-4 p-6 pop-in">
        <div className="flex items-start justify-between mb-3">
          <div>
            <div className="inline-block bg-azulCDB text-bordo px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wider">Auto-avaliação · Liderança</div>
            <h2 className="font-display text-3xl text-bordo mt-1">{colab.nome.toUpperCase()}</h2>
            <p className="text-bordo/70 text-sm">{colab.cargo} · Como <strong>você</strong> se vê neste ciclo (sem ver as notas do seu gestor)</p>
          </div>
          <button onClick={onClose} className="text-bordo text-2xl leading-none">×</button>
        </div>

        <div className="bg-azulCDB/20 border-l-4 border-azulCDB rounded-r-lg p-3 mb-4">
          <p className="text-sm text-bordo">
            <strong>Como funciona:</strong> dê uma nota de 1 (insatisfatório) a 5 (excelência) sendo <strong>honesto consigo mesmo</strong>.
            Seu gestor fará a avaliação dele em separado e depois vocês comparam na reunião — o gap entre as duas notas é o que mais importa.
          </p>
        </div>

        <div className="bg-cinzaCDB rounded-xl p-3 flex items-center gap-3 mb-4">
          <div className="flex-1">
            <div className="text-xs font-bold text-bordo/70 uppercase">Progresso</div>
            <div className="w-full bg-white rounded-full h-3 mt-1">
              <div className="bg-azulCDB h-3 rounded-full transition-all" style={{ width: `${pct}%` }}></div>
            </div>
          </div>
          <div className="text-right">
            <div className="font-display text-2xl text-bordo">{preenchidos}/{todos.length}</div>
            {preenchidos > 0 && <div className="text-xs text-bordo/70">média: <strong>{mediaParcial.toFixed(2)}</strong></div>}
          </div>
        </div>

        <h3 className="font-display text-xl text-bordo mb-2">EU ME CONSIDERO... (universais)</h3>
        {CRITERIOS_UNIVERSAIS.map(c => (
          <CriterioInput key={c.id} criterio={c} valor={criterios[c.id]} onChange={(n) => setNota(c.id, n)} />
        ))}

        <h3 className="font-display text-xl text-bordo mt-5 mb-2">NA MINHA FUNÇÃO ({colab.cargo.toUpperCase()})</h3>
        {(CARGOS[colab.cargo]?.criterios || []).map(c => (
          <CriterioInput key={c.id} criterio={c} valor={criterios[c.id]} onChange={(n) => setNota(c.id, n)} />
        ))}

        <div className="mt-4">
          <label className="text-xs uppercase font-bold text-bordo/70">O que eu quero levar pra reunião com meu gestor?</label>
          <textarea rows="3" value={observacoes} onChange={e => setObservacoes(e.target.value)}
            placeholder="Conquistas que orgulho, dificuldades enfrentadas, apoio que precisa, expectativas..."
            className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-azulCDB" />
        </div>

        <div className="flex gap-2 mt-6">
          {colab.autoAvaliacaoPendente && (
            <button onClick={descartar} className="px-4 py-3 rounded-xl border-2 border-red-700 text-red-700 font-display tracking-wider">DESCARTAR</button>
          )}
          <button onClick={onClose} className="flex-1 py-3 rounded-xl border-2 border-bordo text-bordo font-display tracking-wider">FECHAR</button>
          <button onClick={salvar} className="flex-1 py-3 rounded-xl bg-azulCDB text-bordo font-display tracking-wider">SALVAR</button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   8. PÁGINA: DETALHE DE COLABORADOR
   ========================================================================= */

function DetalheColaborador({ colab, state, dispatch, voltar, setTab }) {
  const [editando, setEditando] = useState(false);
  const [verAval, setVerAval] = useState(null);
  const [autoModal, setAutoModal] = useState(false);

  const avaliacoes = (colab.avaliacoes || []).slice().sort((a,b) => new Date(b.data) - new Date(a.data));
  const ultima = avaliacoes[0];
  const mediaUltima = ultima ? calcularMedia(ultima) : null;
  const rec = mediaUltima !== null ? gerarRecomendacao(mediaUltima, colab.cargo) : null;
  const pontos = ultima ? classificarPontos(ultima, colab.cargo) : null;

  const evolucao = avaliacoes.slice().reverse().map(a => ({ data: a.data, media: calcularMedia(a) }));

  const desativar = () => {
    if (confirm(`Inativar ${colab.nome}? (Pode reverter depois nas Configurações.)`)) {
      dispatch({ type: 'TOGGLE_ATIVO', id: colab.id });
      voltar();
    }
  };

  return (
    <div className="max-w-5xl mx-auto px-4 py-6 space-y-5">
      <button onClick={voltar} className="text-bordo font-bold hover:underline">← voltar</button>

      <div className="bg-bordo diag-text rounded-2xl p-6 text-white">
        <div className="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h1 className="font-display text-4xl md:text-5xl text-amarelo">{colab.nome.toUpperCase()}</h1>
            <p className="font-semibold text-white/90">{colab.cargo} {colab.unidade && `· 📍 ${colab.unidade}`}</p>
            <p className="text-white/70 text-sm">Início: {fmtDate(colab.dataInicio)} · {tempoCasa(colab.dataInicio)} de casa</p>
          </div>
          <div className="flex gap-2 no-print">
            <button onClick={() => setEditando(true)} className="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-amarelo text-sm font-bold">Editar</button>
            <button onClick={desativar} className="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-amarelo text-sm font-bold">Inativar</button>
          </div>
        </div>
      </div>

      {ehLideranca(colab.cargo) && (
        <div className="bg-white rounded-2xl border-2 border-azulCDB/40 p-5">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <div className="inline-block bg-azulCDB text-bordo px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Auto-avaliação · Liderança</div>
              <h3 className="font-display text-xl text-bordo mt-1">
                {colab.autoAvaliacaoPendente
                  ? `Pendente desde ${fmtDate(colab.autoAvaliacaoPendente.data)}`
                  : 'Sem auto-avaliação ativa'}
              </h3>
              <p className="text-sm text-bordo/70">
                {colab.autoAvaliacaoPendente
                  ? `Média do colaborador: ${(Object.values(colab.autoAvaliacaoPendente.criterios || {}).reduce((a,b)=>a+b,0) / Math.max(1, Object.values(colab.autoAvaliacaoPendente.criterios || {}).length)).toFixed(2)} · Ela aparecerá ao lado das suas notas na próxima avaliação oficial.`
                  : 'Antes da reunião, peça que o colaborador preencha como ele se vê.'}
              </p>
            </div>
            <button onClick={() => setAutoModal(true)}
              className="bg-azulCDB hover:bg-azulCDB/80 text-bordo font-display tracking-wider px-4 py-2 rounded-xl">
              {colab.autoAvaliacaoPendente ? 'EDITAR AUTO-AVAL.' : 'INICIAR AUTO-AVAL.'}
            </button>
          </div>
        </div>
      )}

      {!ultima ? (
        <div className="bg-white rounded-2xl border-2 border-dashed border-bordo/20 p-8 text-center">
          <p className="font-display text-2xl text-bordo">SEM AVALIAÇÕES AINDA</p>
          <p className="text-bordo/60 mt-1 mb-4">Faça a primeira pra começar a medir desempenho.</p>
          <button onClick={() => setTab('avaliar')}
            className="bg-vermelho text-amarelo font-display text-lg px-5 py-2.5 rounded-xl tracking-wider">
            INICIAR AVALIAÇÃO
          </button>
        </div>
      ) : (
        <>
          <div className="grid md:grid-cols-3 gap-4">
            <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5 text-center">
              <div className="text-xs uppercase font-bold text-bordo/60 tracking-wider">Última nota</div>
              <div className="font-display text-7xl text-vermelho leading-none">{mediaUltima.toFixed(1)}</div>
              <div className="text-bordo/70 text-sm mt-1">de 5,0 · {fmtDate(ultima.data)}</div>
            </div>
            <div className="md:col-span-2 bg-white rounded-2xl border-2 border-bordo/10 p-5">
              <div className="text-xs uppercase font-bold text-bordo/60 tracking-wider mb-1">Recomendação</div>
              <div className={`inline-block ${rec.cor} px-3 py-1 rounded-lg font-display text-lg tracking-wider mb-2`}>{rec.titulo.toUpperCase()}</div>
              <p className="text-bordo font-semibold leading-snug">{rec.acao}</p>

          </div>

          <div className="grid md:grid-cols-2 gap-4">
            <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
              <h3 className="font-display text-2xl text-bordo mb-3">💪 PONTOS FORTES</h3>
              {pontos.fortes.length === 0
                ? <p className="text-bordo/60 text-sm">Nenhum critério com nota ≥ 4 nesta avaliação.</p>
                : pontos.fortes.map(p => (
                  <div key={p.id} className="py-2 border-b border-bordo/5 flex justify-between gap-3">
                    <span className="text-sm text-bordo">{p.label}</span>
                    <Badge className="bg-green-100 text-green-800">{p.nota}/5</Badge>
                  </div>
                ))}
            </div>
            <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
              <h3 className="font-display text-2xl text-bordo mb-3">🎯 PONTOS A MELHORAR</h3>
              {pontos.fracos.length === 0
                ? <p className="text-bordo/60 text-sm">Nenhum critério com nota ≤ 3. Manda bem!</p>
                : pontos.fracos.map(p => (
                  <div key={p.id} className="py-2 border-b border-bordo/5 flex justify-between gap-3">
                    <span className="text-sm text-bordo">{p.label}</span>
                    <Badge className={p.nota < 2.5 ? 'bg-red-100 text-red-800' : 'bg-amber-100 text-amber-800'}>{p.nota}/5</Badge>
                  </div>
                ))}
            </div>
          </div>

          {evolucao.length > 1 && (
            <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
              <h3 className="font-display text-2xl text-bordo mb-3">📈 EVOLUÇÃO</h3>
              <Sparkline pontos={evolucao} />
            </div>
          )}

          <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
            <h3 className="font-display text-2xl text-bordo mb-3">📚 HISTÓRICO ({avaliacoes.length})</h3>

              {avaliacoes.map((a,i) => {
                const m = calcularMedia(a);
                return (
                  <button key={a.id} onClick={() => setVerAval(a)}
                    className="w-full flex items-center justify-between gap-3 py-3 px-3 rounded-lg hover:bg-cinzaCDB transition border-l-4 border-vermelho/40">

                      <div className="font-display text-2xl text-vermelho">{m.toFixed(1)}</div>
                      <div className="text-[10px] text-bordo/60 uppercase">{gerarRecomendacao(m, a.cargoNaEpoca || colab.cargo).nivel}</div>
                    </div>
                  </button>

              })}
            </div>
          </div>
        </>
      )}

      {editando && <FormColaborador colab={colab} onClose={() => setEditando(false)}
        onSave={(c) => { dispatch({ type: 'UPDATE_COLAB', payload: c }); setEditando(false); }} />}
      {verAval && <ModalVerAvaliacao avaliacao={verAval} colab={colab} onClose={() => setVerAval(null)} dispatch={dispatch} />}
      {autoModal && <AutoAvaliacaoModal colab={colab} onClose={() => setAutoModal(false)} dispatch={dispatch} />}
    </div>
  );
}

function Sparkline({ pontos }) {
  if (pontos.length < 2) return null;
  const w = 600, h = 80, pad = 10;
  const xs = pontos.map((_, i) => pad + i * ((w - pad*2) / (pontos.length - 1)));
  const ys = pontos.map(p => h - pad - (p.media / 5) * (h - pad*2));
  const path = xs.map((x,i) => `${i === 0 ? 'M' : 'L'} ${x} ${ys[i]}`).join(' ');
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-24">
      <path d={path} fill="none" stroke="#CC0000" strokeWidth="3" />
      {xs.map((x,i) => (
        <g key={i}>
          <circle cx={x} cy={ys[i]} r="5" fill="#FECF23" stroke="#680505" strokeWidth="2" />
          <text x={x} y={ys[i]-10} textAnchor="middle" className="text-[10px] fill-bordo font-bold">{pontos[i].media.toFixed(1)}</text>
        </g>
      ))}
    </svg>
  );
}

function ModalVerAvaliacao({ avaliacao, colab, onClose, dispatch }) {
  const cargo = avaliacao.cargoNaEpoca || colab.cargo;
  const todos = [...CRITERIOS_UNIVERSAIS, ...(CARGOS[cargo]?.criterios || [])];
  const media = calcularMedia(avaliacao);
  const rec = gerarRecomendacao(media, cargo);

  const apagar = () => {
    if (confirm('Apagar esta avaliação? Não dá pra desfazer.')) {
      dispatch({ type: 'DEL_AVAL', colabId: colab.id, avalId: avaliacao.id });
      onClose();
    }
  };

  return (
    <div className="fixed inset-0 bg-bordo/70 z-50 flex items-start justify-center p-0 md:p-4 overflow-y-auto">
      <div className="bg-white rounded-2xl max-w-3xl w-full my-4 p-6 pop-in">
        <div className="flex items-start justify-between mb-4">
          <div>
            <h2 className="font-display text-3xl text-bordo">AVALIAÇÃO · {fmtDate(avaliacao.data)}</h2>
            <p className="text-bordo/70">Por {avaliacao.avaliador || '—'} · Cargo: {cargo}</p>
          </div>
          <button onClick={onClose} className="text-bordo text-2xl">×</button>
        </div>

        <div className={`${rec.cor} rounded-xl p-3 mb-4 flex items-center justify-between`}>
          <div>
            <div className="font-display text-xl">{rec.titulo.toUpperCase()}</div>
            <div className="text-sm">{rec.acao}</div>
          </div>
          <div className="font-display text-5xl">{media.toFixed(1)}</div>
        </div>

        {avaliacao.auto && (() => {
          const valsAuto = Object.values(avaliacao.auto.criterios || {}).filter(n => typeof n === 'number');
          const mediaAuto = valsAuto.length ? valsAuto.reduce((a,b)=>a+b,0)/valsAuto.length : 0;
          const gap = media - mediaAuto;
          return (
            <div className="bg-azulCDB/15 border-l-4 border-azulCDB rounded-r-lg p-3 mb-4">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div>
                  <div className="font-display text-bordo">👤 AUTO-AVALIAÇÃO COMPARATIVA</div>
                  <p className="text-sm text-bordo/80">
                    Colaborador: <strong>{mediaAuto.toFixed(2)}</strong> · Gestor: <strong>{media.toFixed(2)}</strong>
                  </p>
                  {avaliacao.auto.observacoes && <p className="text-xs italic text-bordo/70 mt-1">"{avaliacao.auto.observacoes}"</p>}
                </div>
                <div className={`px-3 py-2 rounded-xl text-center
                  ${Math.abs(gap) < 0.5 ? 'bg-green-100 text-green-800'
                    : Math.abs(gap) < 1 ? 'bg-amber-100 text-amber-800'
                    : 'bg-red-100 text-red-800'}`}>
                  <div className="text-[10px] uppercase font-bold">Gap médio</div>
                  <div className="font-display text-2xl">{gap > 0 ? '+' : ''}{gap.toFixed(2)}</div>
                </div>
              </div>
            </div>
          );
        })()}

        <h3 className="font-display text-xl text-bordo mt-4 mb-2">CRITÉRIOS UNIVERSAIS</h3>
        {CRITERIOS_UNIVERSAIS.map(c => (
          <RowCriterio key={c.id} label={c.label}
            nota={avaliacao.criterios?.[c.id]}
            notaAuto={avaliacao.auto?.criterios?.[c.id]} />
        ))}

        <h3 className="font-display text-xl text-bordo mt-5 mb-2">ESPECÍFICOS — {cargo.toUpperCase()}</h3>
        {(CARGOS[cargo]?.criterios || []).map(c => (
          <RowCriterio key={c.id} label={c.label}
            nota={avaliacao.criterios?.[c.id]}
            notaAuto={avaliacao.auto?.criterios?.[c.id]} />
        ))}

        {avaliacao.pontosFortes && (
          <div className="mt-4">
            <h3 className="font-display text-xl text-bordo mb-1">PONTOS FORTES (NOTA DO GESTOR)</h3>
            <p className="text-bordo whitespace-pre-wrap text-sm bg-green-50 p-3 rounded-lg">{avaliacao.pontosFortes}</p>
          </div>
        )}
        {avaliacao.pontosFracos && (
          <div className="mt-4">
            <h3 className="font-display text-xl text-bordo mb-1">PONTOS A MELHORAR (NOTA DO GESTOR)</h3>
            <p className="text-bordo whitespace-pre-wrap text-sm bg-amber-50 p-3 rounded-lg">{avaliacao.pontosFracos}</p>
          </div>
        )}
        {avaliacao.acoes && (
          <div className="mt-4">
            <h3 className="font-display text-xl text-bordo mb-1">PLANO DE AÇÃO</h3>
            <p className="text-bordo whitespace-pre-wrap text-sm bg-cinzaCDB p-3 rounded-lg">{avaliacao.acoes}</p>
          </div>
        )}

        <div className="flex gap-2 mt-6 no-print">
          <button onClick={() => window.print()} className="flex-1 py-2.5 rounded-xl border-2 border-bordo text-bordo font-display tracking-wider">IMPRIMIR / PDF</button>
          <button onClick={apagar} className="px-4 py-2.5 rounded-xl bg-red-700 text-white font-display tracking-wider">APAGAR</button>
        </div>
      </div>
    </div>
  );
}

function RowCriterio({ label, nota, notaAuto }) {
  if (nota === undefined || nota === null) {
    return <div className="py-1.5 text-sm text-bordo/50 flex justify-between"><span>{label}</span><span>—</span></div>;
  }
  const gap = (typeof notaAuto === 'number') ? (nota - notaAuto) : null;
  return (
    <div className="py-1.5 border-b border-bordo/5">
      <div className="flex justify-between items-center gap-3 mb-1 flex-wrap">
        <span className="text-sm text-bordo flex-1 min-w-[60%]">{label}</span>
        <div className="flex items-center gap-2 text-xs">
          {typeof notaAuto === 'number' && (
            <span className="bg-azulCDB/30 text-bordo px-2 py-0.5 rounded font-bold" title="Auto-avaliação">👤 {notaAuto}</span>
          )}
          {gap !== null && gap !== 0 && (
            <span className={`px-2 py-0.5 rounded font-bold
              ${Math.abs(gap) === 1 ? 'bg-amber-100 text-amber-800' : 'bg-red-100 text-red-800'}`}>
              gap {gap > 0 ? '+' : ''}{gap}
            </span>
          )}
          <span className="font-bold text-bordo">{nota} · {ESCALA_LABELS[nota]}</span>
        </div>
      </div>
      <Bar value={nota} />
    </div>
  );
}

/* =========================================================================
   9. PÁGINA: NOVA AVALIAÇÃO
   ========================================================================= */

function NovaAvaliacao({ state, dispatch, setTab, setSelectedId }) {
  const ativos = state.colaboradores.filter(c => c.ativo !== false);
  const [colabId, setColabId] = useState(ativos[0]?.id || '');
  const colab = state.colaboradores.find(c => c.id === colabId);

  const [data, setData] = useState(new Date().toISOString().slice(0, 10));
  const [avaliador, setAvaliador] = useState('');
  const [criterios, setCriterios] = useState({});
  const [pontosFortes, setPontosFortes] = useState('');
  const [pontosFracos, setPontosFracos] = useState('');
  const [acoes, setAcoes] = useState('');

  useEffect(() => { setCriterios({}); }, [colabId]);

  if (ativos.length === 0) {
    return (
      <div className="max-w-3xl mx-auto px-4 py-10 text-center">
        <div className="bg-white rounded-2xl border-2 border-dashed border-bordo/20 p-10">
          <p className="font-display text-3xl text-bordo">CADASTRA UM COLABORADOR PRIMEIRO</p>
          <button onClick={() => setTab('colab')}
            className="mt-4 bg-vermelho text-amarelo font-display text-lg px-5 py-2.5 rounded-xl tracking-wider">
            IR PARA COLABORADORES
          </button>
        </div>
      </div>
    );
  }

  const todos = [...CRITERIOS_UNIVERSAIS, ...(CARGOS[colab?.cargo]?.criterios || [])];
  const preenchidos = todos.filter(c => criterios[c.id] !== undefined).length;
  const pct = todos.length ? Math.round((preenchidos / todos.length) * 100) : 0;
  const mediaParcial = preenchidos > 0
    ? Object.values(criterios).reduce((a,b) => a+b, 0) / preenchidos
    : 0;

  const setNota = (id, nota) => setCriterios(prev => ({ ...prev, [id]: nota }));

  const salvar = () => {
    if (preenchidos < todos.length) {
      if (!confirm(`Faltam ${todos.length - preenchidos} critérios sem nota. Salvar mesmo assim?`)) return;
    }
    const nova = {
      id: uid(),
      data,
      avaliador: avaliador.trim(),
      cargoNaEpoca: colab.cargo,
      criterios: { ...criterios },
      pontosFortes: pontosFortes.trim(),
      pontosFracos: pontosFracos.trim(),
      acoes: acoes.trim(),
      criadaEm: new Date().toISOString(),
    };
    dispatch({ type: 'ADD_AVAL', colabId: colab.id, payload: nova });
    setSelectedId(colab.id);
    setTab('colab');
  };

  return (
    <div className="max-w-4xl mx-auto px-4 py-6 space-y-5">
      <h1 className="font-display text-5xl text-bordo">NOVA AVALIAÇÃO</h1>

      <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5 space-y-3">
        <div className="grid md:grid-cols-3 gap-3">
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Colaborador *</label>
            <select value={colabId} onChange={e => setColabId(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho bg-white">
              {ativos.map(c => <option key={c.id} value={c.id}>{c.nome} — {c.cargo}{c.autoAvaliacaoPendente ? ' · 👤 c/ auto' : ''}</option>)}
            </select>
          </div>
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Data *</label>
            <input type="date" value={data} onChange={e => setData(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho" />
          </div>
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Gestor avaliador</label>
            <input value={avaliador} onChange={e => setAvaliador(e.target.value)} placeholder="seu nome"
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho" />
          </div>
        </div>

        {colab?.autoAvaliacaoPendente && (() => {
          const auto = colab.autoAvaliacaoPendente;
          const valsAuto = Object.values(auto.criterios || {}).filter(n => typeof n === 'number');
          const mediaAuto = valsAuto.length ? valsAuto.reduce((a,b)=>a+b,0)/valsAuto.length : 0;
          const gapMedio = preenchidos > 0 ? (mediaParcial - mediaAuto) : null;
          return (
            <div className="bg-azulCDB/15 border-l-4 border-azulCDB rounded-r-lg p-3">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div>
                  <div className="font-display text-bordo text-lg">👤 AUTO-AVALIAÇÃO DO COLABORADOR DETECTADA</div>
                  <p className="text-sm text-bordo/80">Nota dele: <strong>{mediaAuto.toFixed(2)}</strong> · preenchida em {fmtDate(auto.data)}. Vai aparecer ao lado de cada critério abaixo.</p>
                  {auto.observacoes && <p className="text-xs italic text-bordo/70 mt-1">"{auto.observacoes}"</p>}
                </div>
                {gapMedio !== null && (
                  <div className={`px-3 py-2 rounded-xl text-center
                    ${Math.abs(gapMedio) < 0.5 ? 'bg-green-100 text-green-800'
                      : Math.abs(gapMedio) < 1 ? 'bg-amber-100 text-amber-800'
                      : 'bg-red-100 text-red-800'}`}>
                    <div className="text-[10px] uppercase font-bold">Gap médio</div>
                    <div className="font-display text-2xl">{gapMedio > 0 ? '+' : ''}{gapMedio.toFixed(2)}</div>
                  </div>
                )}
              </div>
            </div>
          );
        })()}

        <div className="bg-cinzaCDB rounded-xl p-3 flex items-center gap-3">
          <div className="flex-1">
            <div className="text-xs font-bold text-bordo/70 uppercase">Progresso</div>
            <div className="w-full bg-white rounded-full h-3 mt-1">
              <div className="bg-vermelho h-3 rounded-full transition-all" style={{ width: `${pct}%` }}></div>
            </div>
          </div>
          <div className="text-right">
            <div className="font-display text-2xl text-bordo">{preenchidos}/{todos.length}</div>
            {preenchidos > 0 && <div className="text-xs text-bordo/70">média: <strong>{mediaParcial.toFixed(2)}</strong></div>}
          </div>
        </div>
      </div>

      <BlocoCriterios titulo="CRITÉRIOS UNIVERSAIS" subtitulo="Aplicáveis a todos os cargos da rede"
        criterios={CRITERIOS_UNIVERSAIS} valores={criterios} setNota={setNota}
        notasAuto={colab?.autoAvaliacaoPendente?.criterios} />

      <BlocoCriterios
        titulo={`ESPECÍFICOS · ${colab?.cargo.toUpperCase()}`}
        subtitulo="Critérios específicos do cargo"
        criterios={CARGOS[colab?.cargo]?.criterios || []} valores={criterios} setNota={setNota}
        notasAuto={colab?.autoAvaliacaoPendente?.criterios} />

      <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5 space-y-3">
        <h3 className="font-display text-2xl text-bordo">OBSERVAÇÕES DO GESTOR</h3>
        <div>
          <label className="text-xs uppercase font-bold text-bordo/70">Pontos fortes destacados</label>
          <textarea rows="3" value={pontosFortes} onChange={e => setPontosFortes(e.target.value)}
            placeholder="O que o colaborador faz de melhor neste ciclo?"
            className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho" />
        </div>
        <div>
          <label className="text-xs uppercase font-bold text-bordo/70">Pontos a melhorar</label>
          <textarea rows="3" value={pontosFracos} onChange={e => setPontosFracos(e.target.value)}
            placeholder="O que precisa evoluir?"
            className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho" />
        </div>
        <div>
          <label className="text-xs uppercase font-bold text-bordo/70">Plano de ação combinado</label>
          <textarea rows="3" value={acoes} onChange={e => setAcoes(e.target.value)}
            placeholder="Treinamentos, metas, prazos, próximos passos..."
            className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho" />
        </div>
      </div>

      <button onClick={salvar}
        className="w-full bg-vermelho hover:bg-bordo text-amarelo font-display text-2xl py-4 rounded-2xl tracking-wider shadow-lg">
        SALVAR AVALIAÇÃO
      </button>
    </div>
  );
}

function BlocoCriterios({ titulo, subtitulo, criterios, valores, setNota, notasAuto }) {
  return (
    <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
      <h2 className="font-display text-2xl text-bordo">{titulo}</h2>
      <p className="text-bordo/60 text-sm mb-3">{subtitulo}</p>
      {criterios.map(c => (
        <CriterioInput key={c.id} criterio={c} valor={valores[c.id]}
          notaAuto={notasAuto?.[c.id]}
          onChange={(n) => setNota(c.id, n)} />
      ))}
    </div>
  );
}

function CriterioInput({ criterio, valor, notaAuto, onChange }) {
  const gap = (typeof valor === 'number' && typeof notaAuto === 'number') ? (valor - notaAuto) : null;
  let gapColor = 'bg-cinzaCDB text-bordo';
  if (gap !== null) {
    if (gap === 0) gapColor = 'bg-green-100 text-green-800';
    else if (Math.abs(gap) === 1) gapColor = 'bg-amber-100 text-amber-800';
    else gapColor = 'bg-red-100 text-red-800';
  }
  return (
    <div className="py-3 border-b border-bordo/10 last:border-0">
      <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
        <span className="text-bordo font-semibold flex-1 min-w-[60%]">{criterio.label}</span>
        <div className="flex items-center gap-2 text-xs">
          {typeof notaAuto === 'number' && (
            <span className="bg-azulCDB/30 text-bordo px-2 py-0.5 rounded font-bold" title="Auto-avaliação do colaborador">
              👤 {notaAuto}
            </span>
          )}
          {gap !== null && (
            <span className={`${gapColor} px-2 py-0.5 rounded font-bold`} title="Gap entre sua nota e a do colaborador">
              gap: {gap > 0 ? '+' : ''}{gap}
            </span>
          )}
          <span className="text-bordo/60">
            {valor !== undefined ? `${valor} · ${ESCALA_LABELS[valor]}` : 'sem nota'}
          </span>
        </div>
      </div>
      <div className="flex gap-1.5">
        {[1,2,3,4,5].map(n => (
          <button key={n} type="button" onClick={() => onChange(n)}
            className={`flex-1 py-2 rounded-lg font-display text-lg transition border-2 relative
              ${valor === n
                ? 'bg-vermelho text-amarelo border-bordo'
                : 'bg-cinzaCDB text-bordo border-transparent hover:border-vermelho'}`}>
            {n}
            {notaAuto === n && valor !== n && (
              <span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-azulCDB text-bordo text-[9px] font-bold flex items-center justify-center" title="Nota do colaborador">👤</span>
            )}
          </button>
        ))}
      </div>
    </div>
  );
}

/* =========================================================================
   10. PÁGINA: CONFIGURAÇÕES (export/import + inativos)
   ========================================================================= */

function Configuracoes({ state, dispatch }) {
  const fileRef = useRef(null);

  const exportar = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cdb_desempenho_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importar = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const dados = JSON.parse(reader.result);
        if (!dados.colaboradores) throw new Error('arquivo inválido');
        if (!confirm(`Importar ${dados.colaboradores.length} colaboradores? Isso vai SUBSTITUIR os dados atuais.`)) return;
        dispatch({ type: 'REPLACE_ALL', payload: dados });
        alert('Importado com sucesso!');
      } catch {
        alert('Arquivo inválido.');
      }
    };
    reader.readAsText(f);
  };

  const exportarCSV = () => {
    const linhas = [['Nome','Cargo','Unidade','Inicio','TempoCasa','Avaliacoes','UltimaData','UltimaMedia','Recomendacao']];
    state.colaboradores.forEach(c => {
      const av = (c.avaliacoes || []).slice().sort((a,b) => new Date(b.data)-new Date(a.data));
      const u = av[0];
      const m = u ? calcularMedia(u) : '';
      const r = u ? gerarRecomendacao(m, c.cargo).titulo : '';
      linhas.push([c.nome, c.cargo, c.unidade || '', c.dataInicio || '', tempoCasa(c.dataInicio), (c.avaliacoes||[]).length, u ? u.data : '', m ? m.toFixed(2) : '', r]);
    });
    const csv = linhas.map(l => l.map(x => `"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `cdb_desempenho_${new Date().toISOString().slice(0,10)}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const apagarTudo = () => {
    if (!confirm('Tem certeza? Apaga TUDO. Sem volta.')) return;
    if (!confirm('Última chance. Apagar mesmo?')) return;
    dispatch({ type: 'REPLACE_ALL', payload: { colaboradores: [] } });
  };

  const inativos = state.colaboradores.filter(c => c.ativo === false);

  return (
    <div className="max-w-3xl mx-auto px-4 py-6 space-y-5">
      <h1 className="font-display text-5xl text-bordo">CONFIGURAÇÕES</h1>

      <section className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
        <h2 className="font-display text-2xl text-bordo mb-2">BACKUP DE DADOS</h2>
        <p className="text-bordo/70 text-sm mb-3">Os dados ficam guardados <strong>só neste navegador</strong>. Faz backup todo final de mês — recomendado.</p>
        <div className="flex flex-wrap gap-2">
          <button onClick={exportar} className="px-4 py-2.5 bg-vermelho text-amarelo font-display tracking-wider rounded-xl">EXPORTAR JSON</button>
          <button onClick={exportarCSV} className="px-4 py-2.5 bg-bordo text-amarelo font-display tracking-wider rounded-xl">EXPORTAR CSV</button>
          <button onClick={() => fileRef.current?.click()} className="px-4 py-2.5 border-2 border-bordo text-bordo font-display tracking-wider rounded-xl">IMPORTAR JSON</button>
          <input ref={fileRef} type="file" accept="application/json" onChange={importar} className="hidden" />
        </div>
      </section>

      <section className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
        <h2 className="font-display text-2xl text-bordo mb-2">COLABORADORES INATIVOS ({inativos.length})</h2>
        {inativos.length === 0
          ? <p className="text-bordo/60">Nenhum.</p>
          : inativos.map(c => (
            <div key={c.id} className="flex items-center justify-between py-2 border-b border-bordo/5">
              <span className="text-bordo">{c.nome} · {c.cargo}</span>
              <button onClick={() => dispatch({ type: 'TOGGLE_ATIVO', id: c.id })}
                className="text-vermelho text-sm font-bold hover:underline">Reativar</button>
            </div>
          ))}
      </section>

      <section className="bg-red-50 rounded-2xl border-2 border-red-200 p-5">
        <h2 className="font-display text-2xl text-red-800 mb-2">ZONA DE PERIGO</h2>
        <button onClick={apagarTudo} className="px-4 py-2.5 bg-red-700 text-white font-display tracking-wider rounded-xl">APAGAR TUDO</button>
      </section>

      <p className="text-center text-xs text-bordo/50">
        Cachorro do Bigode · Desempenho v1.0 · Mitawa Licenciadora · 🌭
      </p>
    </div>
  );
}

/* =========================================================================
   11. APP RAIZ + REDUCER
   ========================================================================= */

function reducer(state, action) {
  switch (action.type) {
    case 'ADD_COLAB':
      return { ...state, colaboradores: [...state.colaboradores, action.payload] };
    case 'UPDATE_COLAB':
      return { ...state, colaboradores: state.colaboradores.map(c => c.id === action.payload.id ? { ...c, ...action.payload } : c) };
    case 'TOGGLE_ATIVO':
      return { ...state, colaboradores: state.colaboradores.map(c => c.id === action.id ? { ...c, ativo: !(c.ativo !== false) } : c) };
    case 'ADD_AVAL':
      // Se houver auto-avaliação pendente, embute na avaliação oficial e limpa
      return { ...state, colaboradores: state.colaboradores.map(c => {
        if (c.id !== action.colabId) return c;
        const aval = c.autoAvaliacaoPendente
          ? { ...action.payload, auto: c.autoAvaliacaoPendente }
          : action.payload;
        return { ...c, avaliacoes: [...(c.avaliacoes || []), aval], autoAvaliacaoPendente: null };
      }) };
    case 'DEL_AVAL':
      return { ...state, colaboradores: state.colaboradores.map(c =>
        c.id === action.colabId ? { ...c, avaliacoes: (c.avaliacoes || []).filter(a => a.id !== action.avalId) } : c) };
    case 'SAVE_AUTO':
      return { ...state, colaboradores: state.colaboradores.map(c =>
        c.id === action.colabId ? { ...c, autoAvaliacaoPendente: action.payload } : c) };
    case 'CLEAR_AUTO':
      return { ...state, colaboradores: state.colaboradores.map(c =>
        c.id === action.colabId ? { ...c, autoAvaliacaoPendente: null } : c) };
    case 'REPLACE_ALL':
      return action.payload;
    default:
      return state;
  }
}

function App() {
  const [state, setState] = useState(loadState);
  const [tab, setTab] = useState('dashboard');
  const [selectedId, setSelectedId] = useState(null);

  useEffect(() => { saveState(state); }, [state]);

  const dispatch = (action) => setState(prev => reducer(prev, action));

  return (
    <div className="min-h-screen paper-bg">
      <Header tab={tab} setTab={(t) => { setTab(t); if (t !== 'colab') setSelectedId(null); }} />
      <main>
        {tab === 'dashboard' && <Dashboard state={state} setTab={setTab} setSelectedId={setSelectedId} />}
        {tab === 'colab'     && <ListaColaboradores state={state} dispatch={dispatch} selectedId={selectedId} setSelectedId={setSelectedId} setTab={setTab} />}
        {tab === 'avaliar'   && <NovaAvaliacao state={state} dispatch={dispatch} setTab={setTab} setSelectedId={setSelectedId} />}
        {tab === 'config'    && <Configuracoes state={state} dispatch={dispatch} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
