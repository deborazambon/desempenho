  const v = Object.values(avaliacao.criterios || {}).filter(n => typeof n === 'number');

  return v.reduce((a,b) => a+b, 0) / v.length;
}

function classificarPontos(avaliacao, cargo) {
  const todos = [...CRITERIOS_UNIVERSAIS, ...(CARGOS[cargo]?.criterios || [])];
  const itens = todos.map(c => ({
    id: c.id, label: c.label,
    nota: avaliacao.criterios?.[c.id] ?? null,
  })).filter(x => x.nota !== null);
  const fortes = [...itens].filter(i => i.nota >= 4).sort((a,b) => b.nota - a.nota).slice(0, 5);
  const fracos = [...itens].filter(i => i.nota <= 3).sort((a,b) => a.nota - b.nota).slice(0, 5);
  return { fortes, fracos };
}

/* =========================================================================

const SHEETS_URL_KEY  = 'cdb_sheets_url';
const LAST_SYNC_KEY   = 'cdb_last_sync';
const SYNC_PENDING_KEY = 'cdb_sync_pending';

function getSheetsUrl() {
  // Prioridade 1: URL hardcoded ofuscada (West, Michael, Débora não precisam configurar)
  const fixa = getSheetsUrlFixa();
  if (fixa) return fixa;
  // Prioridade 2: URL configurada manualmente (fallback)
  return localStorage.getItem(SHEETS_URL_KEY) || '';
}
function setSheetsUrl(url) {
  if (url) localStorage.setItem(SHEETS_URL_KEY, url);
  else     localStorage.removeItem(SHEETS_URL_KEY);
}

/* URL ofuscada — só "desembaralha" se a senha foi validada.
   Não é criptografia forte, mas filtra 99% de curiosos. Quem souber DevTools
   precisaria também conhecer a senha do time. Se nada estiver configurado, retorna ''. */
const URL_PARTES = [
  'aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Y=',
  'eWNieXBSUzY0bk4wYzJmZW5Zd25GMnpIdG9GWHVoek5MMzBrZEY=',
  'STB2dUNvdGtPVnpSOEFBRURtZGVFcnhneXVWc25tYmJ3L2V4ZWM=',
];
function getSheetsUrlFixa() {
  // Se ainda não foi configurada (todas vazias), retorna vazio — cai no fallback manual
  if (URL_PARTES.every(p => !p)) return '';
  // Só desembaralha se autenticado
  if (!isAuthValid()) return '';
  try {
    const decoded = URL_PARTES.map(p => atob(p)).join('');
    return decoded.startsWith('https://') ? decoded : '';
  } catch { return ''; }
}

async function pullFromSheets() {
  const url = getSheetsUrl();
  if (!url) throw new Error('URL do Sheets não configurada');
  const res = await fetch(url + '?action=read', { method: 'GET' });
  if (!res.ok) throw new Error('Falha ao ler planilha (HTTP ' + res.status + ')');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function pushToSheets(state) {
  const url = getSheetsUrl();
  if (!url) throw new Error('URL do Sheets não configurada');
  // Apps Script Web App não aceita custom headers via fetch sem CORS preflight.
  // Solução: enviar como text/plain com payload JSON no body — Apps Script entende.
  const res = await fetch(url, {
    method: 'POST',
    body: JSON.stringify({ action: 'write', state }),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
  });
  if (!res.ok) throw new Error('Falha ao escrever (HTTP ' + res.status + ')');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  localStorage.setItem(LAST_SYNC_KEY, new Date().toISOString());
  localStorage.removeItem(SYNC_PENDING_KEY);
  return data;
}

function markSyncPending() {
  localStorage.setItem(SYNC_PENDING_KEY, new Date().toISOString());
}
function isSyncPending() {
  return !!localStorage.getItem(SYNC_PENDING_KEY);
}
function getLastSync() {
  return localStorage.getItem(LAST_SYNC_KEY);
}

/* =========================================================================
   AUTENTICAÇÃO POR SENHA (nível 2 — hash do time, com 2 níveis de acesso)
   - Master: vê e edita TUDO (todos os cargos)
   - Gerencial: vê e edita só até Líder + Aux. administrativo
   ========================================================================= */

const SENHAS = {
  master:    '8389a5fd6ca475ae12d88ba321b1775f90dda2565d610e7e4e86632c9916db08', // Bigode@original1972
  gerencial: '103bba885a214e0e646f0753593839616dbc44e8cb767087d88ca5a0005864b9', // Cachorro@RH2026
};

// Cargos que o nível GERENCIAL pode ver/editar
const CARGOS_GERENCIAL = ['Atendente', 'Auxiliar de cozinha', 'Monitor', 'Líder de equipe', 'Auxiliar administrativo'];

// Verifica se o usuário atual pode acessar determinado cargo
function podeAcessarCargo(cargo, nivel) {
  if (nivel === 'master') return true;
  if (nivel === 'gerencial') return CARGOS_GERENCIAL.includes(cargo);
  return false;
}

// Filtra lista de colaboradores conforme permissão
function filtrarColabsPorNivel(colaboradores, nivel) {
  if (nivel === 'master') return colaboradores;
  return colaboradores.filter(c => podeAcessarCargo(c.cargo, nivel));
}

const AUTH_KEY = 'cdb_auth_ok';
const AUTH_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 30 dias

async function sha256Hex(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Retorna o nível ('master', 'gerencial') ou null se não bater
async function identificarNivel(senha) {
  const hash = await sha256Hex(senha.trim());
  if (hash === SENHAS.master) return 'master';
  if (hash === SENHAS.gerencial) return 'gerencial';
  return null;
}

function getAuthInfo() {
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if (!raw) return null;
    const info = JSON.parse(raw);
    if ((Date.now() - info.ts) >= AUTH_TTL_MS) return null;
    return info; // { ts, nivel }
  } catch { return null; }
}

function isAuthValid() {
  return !!getAuthInfo();
}

function getNivelAtual() {
  return getAuthInfo()?.nivel || null;
}

function setAuthValid(nivel) {
  localStorage.setItem(AUTH_KEY, JSON.stringify({ ts: Date.now(), nivel }));
}

function clearAuth() {
  localStorage.removeItem(AUTH_KEY);
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function tempoCasa(dataInicio) {
  if (!dataInicio) return '—';
  const d = new Date(dataInicio);
  if (isNaN(d)) return '—';
  const hoje = new Date();
  let anos = hoje.getFullYear() - d.getFullYear();
  let meses = hoje.getMonth() - d.getMonth();
  if (hoje.getDate() < d.getDate()) meses--;
  if (meses < 0) { anos--; meses += 12; }
  if (anos === 0 && meses === 0) return 'menos de 1 mês';
  if (anos === 0) return `${meses} ${meses === 1 ? 'mês' : 'meses'}`;
  if (meses === 0) return `${anos} ${anos === 1 ? 'ano' : 'anos'}`;
  return `${anos}a ${meses}m`;
}

  const nivelIcon = nivel === 'master' ? '👑' : '👤';
  const nivelText = nivel === 'master' ? 'Master' : 'Gerencial';
  return (
    <header className="bg-bordo diag-text border-b-4 border-amarelo sticky top-0 z-40">
      <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-2">
        <Logo />
        <div className="flex items-center gap-2">
          {nivel && (
            <span className="hidden sm:inline-flex items-center gap-1 px-2 py-1 rounded-lg bg-amarelo/20 text-amarelo text-xs font-bold border border-amarelo/30">
              <span>{nivelIcon}</span><span>{nivelText}</span>
            </span>
          )}
          {sheetsActive && (
            <button onClick={() => setTab('config')}
              title={`Status: ${syncText}`}
              className="hidden sm:flex items-center gap-1 px-2 py-1 rounded-lg bg-white/10 hover:bg-white/20 text-amarelo text-xs font-bold">
              <span>{syncIcon}</span><span className="opacity-80">{syncText}</span>
            </button>
          )}
          <nav className="hidden md:flex gap-1">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`px-4 py-2 rounded-lg font-display text-lg tracking-wider transition
                  ${tab === t.id ? 'bg-amarelo text-bordo' : 'text-amarelo hover:bg-white/10'}`}>
                {t.label.toUpperCase()}
              </button>

        </div>
      </div>
      <div className="sm:hidden bg-bordo/50 text-amarelo text-xs text-center py-1 border-t border-amarelo/20 flex items-center justify-center gap-3">
        {nivel && <span>{nivelIcon} {nivelText}</span>}
        {sheetsActive && <span>{syncIcon} {syncText}</span>}
      </div>
      <nav className="md:hidden flex overflow-x-auto scrollbar-thin border-t border-amarelo/20">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={`flex-shrink-0 px-4 py-2 font-display text-sm tracking-wider transition
              ${tab === t.id ? 'bg-amarelo text-bordo' : 'text-amarelo'}`}>
            {t.label.toUpperCase()}

  );
}

/* =========================================================================
   6. PÁGINA: DASHBOARD
   ========================================================================= */

function Dashboard({ state, setTab, setSelectedId, nivel }) {
  const todosColabs = state.colaboradores.filter(c => c.ativo !== false);
  const colabs = filtrarColabsPorNivel(todosColabs, nivel);
  const total = colabs.length;

  const todasAvaliacoes = colabs.flatMap(c => (c.avaliacoes || []).map(a => ({ ...a, colab: c })));
  const ultimoMes = new Date(); ultimoMes.setDate(ultimoMes.getDate() - 30);
  const avaliacoesMes = todasAvaliacoes.filter(a => new Date(a.data) >= ultimoMes).length;

  const ultimaPorColab = colabs.map(c => {
    const av = (c.avaliacoes || []).slice().sort((a,b) => new Date(b.data) - new Date(a.data))[0];
    return { c, ultima: av };
  });

  const promo  = ultimaPorColab.filter(x => x.ultima && calcularMedia(x.ultima) >= 4.8).length;
  const prd    = ultimaPorColab.filter(x => x.ultima && calcularMedia(x.ultima) < 2.5).length;
  const semAv  = ultimaPorColab.filter(x => !x.ultima).length;

  // Item 6: atrasados respeita prazo do cargo
  const atrasados = ultimaPorColab.filter(x => {
    if (!x.ultima) return false;
    const prazoMs = prazoCargo(x.c.cargo) * 86400000;
    return (new Date() - new Date(x.ultima.data)) > prazoMs;
  }).length;

  const autoPendentes = colabs.filter(c => c.autoAvaliacaoPendente);

  const top = [...ultimaPorColab]
    .filter(x => x.ultima)
    .map(x => ({ ...x, media: calcularMedia(x.ultima) }))
    .sort((a,b) => b.media - a.media)
    .slice(0,5);

  const atencao = [...ultimaPorColab]
    .filter(x => x.ultima)
    .map(x => ({ ...x, media: calcularMedia(x.ultima) }))
    .filter(x => x.media < 3.5)
    .sort((a,b) => a.media - b.media)
    .slice(0,5);

  return (
    <div className="max-w-6xl mx-auto px-4 py-6 space-y-6">
      <div className="flex items-end justify-between flex-wrap gap-3">
        <div>
          <h1 className="font-display text-5xl text-bordo">PAINEL DE DESEMPENHO</h1>
          <p className="text-bordo/70 font-semibold">Visão geral da operação — Cachorro do Bigode</p>
        </div>
        <button onClick={() => setTab('avaliar')}
          className="bg-vermelho hover:bg-bordo text-amarelo font-display text-xl px-5 py-3 rounded-xl tracking-wider shadow-md">
          + NOVA AVALIAÇÃO
        </button>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <Stat label="Colaboradores"      value={total}         accent="bg-bordo" />
        <Stat label="Avaliações 30d"     value={avaliacoesMes} accent="bg-vermelho" />
        <Stat label="Prontos p/ promoção" value={promo}        accent="bg-amarelo" />
        <Stat label="Em PRD"             value={prd}           accent="bg-red-700" />
        <Stat label="Atrasados (prazo)"  value={atrasados + semAv} accent="bg-azulCDB" />
      </div>

      {autoPendentes.length > 0 && (
        <div className="bg-azulCDB/15 border-l-4 border-azulCDB rounded-r-xl p-4">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div>
              <div className="font-display text-xl text-bordo">👤 {autoPendentes.length} AUTO-AVALIAÇÃO(ÕES) PENDENTE(S)</div>
              <p className="text-sm text-bordo/80">
                {autoPendentes.map(c => c.nome).join(', ')} já preencheram. Aguardando sua avaliação oficial pra fechar o ciclo.
              </p>
            </div>
            <button onClick={() => setTab('avaliar')}
              className="bg-azulCDB text-bordo font-display px-4 py-2 rounded-xl tracking-wider">
              FECHAR CICLO
            </button>
          </div>
        </div>
      )}

      {(() => {
        const ultimoBackup = localStorage.getItem('cdb_ultimo_backup');
        const dias = ultimoBackup ? Math.floor((new Date() - new Date(ultimoBackup)) / 86400000) : null;
        const totalDados = colabs.length + colabs.reduce((s,c)=>s+(c.avaliacoes||[]).length, 0);
        if (totalDados === 0) return null;
        if (dias === null) {
          return (
            <div className="bg-amber-50 border-l-4 border-amber-400 rounded-r-xl p-4">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div>
                  <div className="font-display text-xl text-amber-900">⚠️ FAÇA SEU PRIMEIRO BACKUP</div>
                  <p className="text-sm text-amber-900/80">Você nunca fez backup. Se trocar de celular ou limpar o navegador, perde tudo.</p>
                </div>
                <button onClick={() => setTab('config')}
                  className="bg-amber-500 text-white font-display px-4 py-2 rounded-xl tracking-wider">
                  FAZER BACKUP
                </button>
              </div>
            </div>
          );
        }
        if (dias > 7) {
          return (
            <div className="bg-red-50 border-l-4 border-red-500 rounded-r-xl p-4">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div>
                  <div className="font-display text-xl text-red-800">🚨 BACKUP HÁ {dias} DIAS</div>
                  <p className="text-sm text-red-800/80">Faça backup agora pra não perder os dados acumulados.</p>
                </div>
                <button onClick={() => setTab('config')}
                  className="bg-red-700 text-white font-display px-4 py-2 rounded-xl tracking-wider">
                  BACKUP AGORA
                </button>
              </div>
            </div>
          );
        }
        return null;
      })()}

      <div className="grid md:grid-cols-2 gap-6">
        <section className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
          <h2 className="font-display text-2xl text-bordo mb-3">🏆 TOP PERFORMERS</h2>
          {top.length === 0 ? (
            <p className="text-bordo/60">Sem avaliações ainda. Bora começar?</p>
          ) : top.map(x => (
            <button key={x.c.id} onClick={() => { setSelectedId(x.c.id); setTab('colab'); }}
              className="w-full flex items-center justify-between py-2 border-b border-bordo/10 hover:bg-cinzaCDB rounded transition">
              <div className="text-left">
                <div className="font-bold text-bordo">{x.c.nome}</div>
                <div className="text-xs text-bordo/60">{x.c.cargo}</div>
              </div>
              <div className="font-display text-2xl text-vermelho">{x.media.toFixed(1)}</div>
            </button>
          ))}
        </section>

        <section className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
          <h2 className="font-display text-2xl text-bordo mb-3">⚠️ MERECEM ATENÇÃO</h2>
          {atencao.length === 0 ? (
            <p className="text-bordo/60">Ninguém em atenção. 🌭</p>
          ) : atencao.map(x => (
            <button key={x.c.id} onClick={() => { setSelectedId(x.c.id); setTab('colab'); }}
              className="w-full flex items-center justify-between py-2 border-b border-bordo/10 hover:bg-cinzaCDB rounded transition">
              <div className="text-left">
                <div className="font-bold text-bordo">{x.c.nome}</div>
                <div className="text-xs text-bordo/60">{x.c.cargo}</div>
              </div>
              <div className="font-display text-2xl" style={{ color: x.media < 2.5 ? '#7F1D1D' : '#CC0000' }}>{x.media.toFixed(1)}</div>
            </button>
          ))}
        </section>
      </div>
    </div>
  );
}

function ListaColaboradores({ state, dispatch, selectedId, setSelectedId, setTab, nivel }) {
  const [busca, setBusca] = useState('');
  const [filtroCargo, setFiltroCargo] = useState('todos');
  const [showForm, setShowForm] = useState(false);

  // Cargos visíveis pra esse nível
  const cargosVisiveis = nivel === 'master' ? CARGO_LISTA : CARGOS_GERENCIAL;

  const lista = state.colaboradores
    .filter(c => c.ativo !== false)
    .filter(c => podeAcessarCargo(c.cargo, nivel))
    .filter(c => filtroCargo === 'todos' || c.cargo === filtroCargo)
    .filter(c => c.nome.toLowerCase().includes(busca.toLowerCase()));

  const sel = state.colaboradores.find(c => c.id === selectedId);
  // Bloqueia acesso direto a colaborador de cargo restrito (e.g. URL antiga, sync)
  const selBloqueado = sel && !podeAcessarCargo(sel.cargo, nivel);
  if (sel && selBloqueado) {
    return (
      <div className="max-w-2xl mx-auto px-4 py-10">
        <div className="bg-red-50 border-2 border-red-300 rounded-2xl p-6 text-center">
          <div className="text-5xl mb-3">🔒</div>
          <h2 className="font-display text-2xl text-red-800">ACESSO RESTRITO</h2>
          <p className="text-sm text-red-800/80 mt-2">
            Este colaborador é de um cargo que não está disponível pro acesso gerencial. Apenas o acesso master pode visualizar.
          </p>
          <button onClick={() => setSelectedId(null)}
            className="mt-4 px-4 py-2 bg-bordo text-amarelo font-display tracking-wider rounded-xl">VOLTAR</button>
        </div>
      </div>
    );
  }

  if (sel) {
    return <DetalheColaborador
      colab={sel} state={state} dispatch={dispatch}
      voltar={() => setSelectedId(null)}
      setTab={setTab}
      nivel={nivel}
    />;
  }

  return (
    <div className="max-w-6xl mx-auto px-4 py-6 space-y-4">
      <div className="flex items-end justify-between flex-wrap gap-3">
        <h1 className="font-display text-5xl text-bordo">COLABORADORES</h1>
        <button onClick={() => setShowForm(true)}
          className="bg-vermelho hover:bg-bordo text-amarelo font-display text-xl px-5 py-3 rounded-xl tracking-wider shadow-md">
          + CADASTRAR
        </button>
      </div>

      <div className="flex flex-wrap gap-2">
        <input type="text" placeholder="Buscar por nome..."
          value={busca} onChange={e => setBusca(e.target.value)}
          className="flex-1 min-w-[200px] px-4 py-2 rounded-xl border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
        <select value={filtroCargo} onChange={e => setFiltroCargo(e.target.value)}
          className="px-4 py-2 rounded-xl border-2 border-bordo/20 focus:border-vermelho focus:outline-none bg-white font-semibold text-bordo">
          <option value="todos">Todos os cargos</option>
          {cargosVisiveis.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      {lista.length === 0 ? (
        <div className="bg-white rounded-2xl border-2 border-dashed border-bordo/20 p-10 text-center">
          <p className="font-display text-2xl text-bordo">NENHUM COLABORADOR AINDA</p>
          <p className="text-bordo/60 mt-2">Cadastra o primeiro pra começar.</p>
        </div>
      ) : (
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {lista.map(c => {
            const ultima = (c.avaliacoes || []).slice().sort((a,b) => new Date(b.data)-new Date(a.data))[0];
            const media = ultima ? calcularMedia(ultima) : null;
            return (
              <button key={c.id} onClick={() => setSelectedId(c.id)}
                className="bg-white rounded-2xl border-2 border-bordo/10 p-4 text-left hover:border-vermelho hover:shadow-lg transition">
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="font-display text-xl text-bordo truncate">{c.nome}</div>
                    <div className="text-sm text-bordo/70 font-semibold">{c.cargo}</div>
                    {c.unidade && <div className="text-xs text-bordo/50">📍 {c.unidade}</div>}
                  </div>
                  {media !== null && (
                    <div className="text-right">
                      <div className="font-display text-3xl text-vermelho">{media.toFixed(1)}</div>
                      <div className="text-[10px] text-bordo/60 uppercase">última nota</div>
                    </div>
                  )}
                </div>
                <div className="mt-3 flex items-center justify-between text-xs text-bordo/60">
                  <span>🗓️ {tempoCasa(c.dataInicio)} de casa</span>
                  <div className="flex items-center gap-2">
                    {c.autoAvaliacaoPendente && <span className="bg-azulCDB/30 text-bordo px-2 py-0.5 rounded font-bold">👤 auto</span>}
                    <span>{(c.avaliacoes || []).length} aval.</span>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {showForm && <FormColaborador

        onClose={() => setShowForm(false)}
        onSave={(novo) => { dispatch({ type: 'ADD_COLAB', payload: novo }); setShowForm(false); }}
      />}
    </div>
  );

function FormColaborador({ onClose, onSave, colab, nivel }) {
  const cargosDisponiveis = nivel === 'master' ? CARGO_LISTA : CARGOS_GERENCIAL;
  const [nome, setNome] = useState(colab?.nome || '');
  const [cargo, setCargo] = useState(colab?.cargo || cargosDisponiveis[0]);
  const [dataInicio, setDataInicio] = useState(colab?.dataInicio || '');
  const [unidade, setUnidade] = useState(colab?.unidade || '');
  const [cpf, setCpf] = useState(colab?.cpf || '');

  const salvar = () => {
    if (!nome.trim()) { alert('Informa o nome.'); return; }
    if (!dataInicio) { alert('Informa a data de início.'); return; }
    onSave({
      id: colab?.id || uid(),
      nome: nome.trim(), cargo, dataInicio, unidade: unidade.trim(), cpf: cpf.trim(),
      ativo: colab?.ativo ?? true,
      avaliacoes: colab?.avaliacoes || [],
      criadoEm: colab?.criadoEm || new Date().toISOString(),
    });
  };

  return (
    <div className="fixed inset-0 bg-bordo/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4">
      <div className="bg-white rounded-t-3xl md:rounded-2xl max-w-lg w-full p-6 pop-in">
        <h2 className="font-display text-3xl text-bordo">{colab ? 'EDITAR' : 'CADASTRAR'} COLABORADOR</h2>
        <div className="space-y-3 mt-4">
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Nome completo *</label>
            <input value={nome} onChange={e => setNome(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
          </div>
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Cargo *</label>
            <select value={cargo} onChange={e => setCargo(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none bg-white">
              {cargosDisponiveis.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs uppercase font-bold text-bordo/70">Data de início *</label>
              <input type="date" value={dataInicio} onChange={e => setDataInicio(e.target.value)}
                className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
            </div>
            <div>
              <label className="text-xs uppercase font-bold text-bordo/70">Unidade</label>
              <input value={unidade} onChange={e => setUnidade(e.target.value)} placeholder="ex: Cidade Baixa"
                className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
            </div>
          </div>
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">CPF (opcional)</label>
            <input value={cpf} onChange={e => setCpf(e.target.value)} placeholder="000.000.000-00"
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho focus:outline-none" />
          </div>
        </div>
        <div className="flex gap-2 mt-6">
          <button onClick={onClose} className="flex-1 py-3 rounded-xl border-2 border-bordo text-bordo font-display tracking-wider">CANCELAR</button>
          <button onClick={salvar} className="flex-1 py-3 rounded-xl bg-vermelho text-amarelo font-display tracking-wider">SALVAR</button>
        </div>
      </div>
    </div>
  );
}

/* -------------------------------------------------------------------------
   AUTO-AVALIAÇÃO (somente cargos de liderança)
   O colaborador preenche em primeira pessoa antes da reunião com o gestor.
   Fica como `autoAvaliacaoPendente` até ser consumida pela próxima avaliação.
   ------------------------------------------------------------------------- */

function AutoAvaliacaoModal({ colab, onClose, dispatch }) {
  const [criterios, setCriterios] = useState(colab.autoAvaliacaoPendente?.criterios || {});
  const [observacoes, setObservacoes] = useState(colab.autoAvaliacaoPendente?.observacoes || '');
  const [data] = useState(new Date().toISOString().slice(0, 10));

  const todos = [...CRITERIOS_UNIVERSAIS, ...(CARGOS[colab.cargo]?.criterios || [])];
  const preenchidos = todos.filter(c => criterios[c.id] !== undefined).length;
  const pct = todos.length ? Math.round((preenchidos / todos.length) * 100) : 0;
  const mediaParcial = preenchidos > 0
    ? Object.values(criterios).filter(n => typeof n === 'number').reduce((a,b) => a+b, 0) / preenchidos
    : 0;

  const setNota = (id, nota) => setCriterios(prev => ({ ...prev, [id]: nota }));

  const salvar = () => {
    if (preenchidos < todos.length) {
      if (!confirm(`Faltam ${todos.length - preenchidos} critérios sem nota. Salvar mesmo assim?`)) return;
    }
    const auto = {
      id: uid(),
      data,
      cargoNaEpoca: colab.cargo,
      criterios: { ...criterios },
      observacoes: observacoes.trim(),
      criadaEm: new Date().toISOString(),
    };
    dispatch({ type: 'SAVE_AUTO', colabId: colab.id, payload: auto });
    onClose();
  };

  const descartar = () => {
    if (!confirm('Descartar esta auto-avaliação?')) return;
    dispatch({ type: 'CLEAR_AUTO', colabId: colab.id });
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-bordo/70 z-50 flex items-start justify-center p-0 md:p-4 overflow-y-auto">
      <div className="bg-white rounded-2xl max-w-3xl w-full my-4 p-6 pop-in">
        <div className="flex items-start justify-between mb-3">
          <div>
            <div className="inline-block bg-azulCDB text-bordo px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wider">Auto-avaliação · Liderança</div>
            <h2 className="font-display text-3xl text-bordo mt-1">{colab.nome.toUpperCase()}</h2>
            <p className="text-bordo/70 text-sm">{colab.cargo} · Como <strong>você</strong> se vê neste ciclo (sem ver as notas do seu gestor)</p>
          </div>
          <button onClick={onClose} className="text-bordo text-2xl leading-none">×</button>
        </div>

        <div className="bg-azulCDB/20 border-l-4 border-azulCDB rounded-r-lg p-3 mb-4">
          <p className="text-sm text-bordo">
            <strong>Como funciona:</strong> dê uma nota de 1 (insatisfatório) a 5 (excelência) sendo <strong>honesto consigo mesmo</strong>.
            Seu gestor fará a avaliação dele em separado e depois vocês comparam na reunião — o gap entre as duas notas é o que mais importa.
          </p>
        </div>

        <div className="bg-cinzaCDB rounded-xl p-3 flex items-center gap-3 mb-4">
          <div className="flex-1">
            <div className="text-xs font-bold text-bordo/70 uppercase">Progresso</div>
            <div className="w-full bg-white rounded-full h-3 mt-1">
              <div className="bg-azulCDB h-3 rounded-full transition-all" style={{ width: `${pct}%` }}></div>
            </div>
          </div>
          <div className="text-right">
            <div className="font-display text-2xl text-bordo">{preenchidos}/{todos.length}</div>
            {preenchidos > 0 && <div className="text-xs text-bordo/70">média: <strong>{mediaParcial.toFixed(2)}</strong></div>}
          </div>
        </div>

        <h3 className="font-display text-xl text-bordo mb-2">EU ME CONSIDERO... (universais)</h3>
        {CRITERIOS_UNIVERSAIS.map(c => (
          <CriterioInput key={c.id} criterio={c} valor={criterios[c.id]} onChange={(n) => setNota(c.id, n)} />
        ))}

        <h3 className="font-display text-xl text-bordo mt-5 mb-2">NA MINHA FUNÇÃO ({colab.cargo.toUpperCase()})</h3>
        {(CARGOS[colab.cargo]?.criterios || []).map(c => (

function Sparkline({ pontos }) {
  if (pontos.length < 2) return null;
  const w = 600, h = 80, pad = 10;
  const xs = pontos.map((_, i) => pad + i * ((w - pad*2) / (pontos.length - 1)));
  const ys = pontos.map(p => h - pad - (p.media / 5) * (h - pad*2));
  const path = xs.map((x,i) => `${i === 0 ? 'M' : 'L'} ${x} ${ys[i]}`).join(' ');
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-24">
      <path d={path} fill="none" stroke="#CC0000" strokeWidth="3" />
      {xs.map((x,i) => (
        <g key={i}>
          <circle cx={x} cy={ys[i]} r="5" fill="#FECF23" stroke="#680505" strokeWidth="2" />
          <text x={x} y={ys[i]-10} textAnchor="middle" className="text-[10px] fill-bordo font-bold">{pontos[i].media.toFixed(1)}</text>
        </g>
      ))}
    </svg>
  );
}

function RowCriterio({ label, nota, notaAuto }) {
  if (nota === undefined || nota === null) {
    return <div className="py-1.5 text-sm text-bordo/50 flex justify-between"><span>{label}</span><span>—</span></div>;
  }
  const gap = (typeof notaAuto === 'number') ? (nota - notaAuto) : null;
  return (
    <div className="py-1.5 border-b border-bordo/5">
      <div className="flex justify-between items-center gap-3 mb-1 flex-wrap">
        <span className="text-sm text-bordo flex-1 min-w-[60%]">{label}</span>
        <div className="flex items-center gap-2 text-xs">
          {typeof notaAuto === 'number' && (
            <span className="bg-azulCDB/30 text-bordo px-2 py-0.5 rounded font-bold" title="Auto-avaliação">👤 {notaAuto}</span>
          )}
          {gap !== null && gap !== 0 && (
            <span className={`px-2 py-0.5 rounded font-bold
              ${Math.abs(gap) === 1 ? 'bg-amber-100 text-amber-800' : 'bg-red-100 text-red-800'}`}>
              gap {gap > 0 ? '+' : ''}{gap}
            </span>
          )}
          <span className="font-bold text-bordo">{nota} · {ESCALA_LABELS[nota]}</span>
        </div>
      </div>
      <Bar value={nota} />
    </div>
  );
}

/* =========================================================================
   9. PÁGINA: NOVA AVALIAÇÃO
   ========================================================================= */

function NovaAvaliacao({ state, dispatch, setTab, setSelectedId, nivel }) {
  const ativos = state.colaboradores.filter(c => c.ativo !== false && podeAcessarCargo(c.cargo, nivel));
  const [colabId, setColabId] = useState(ativos[0]?.id || '');
  const colab = state.colaboradores.find(c => c.id === colabId);

  const [data, setData] = useState(new Date().toISOString().slice(0, 10));
  const [avaliador, setAvaliador] = useState('');
  const [criterios, setCriterios] = useState({});
  const [pontosFortes, setPontosFortes] = useState('');
  const [pontosFracos, setPontosFracos] = useState('');
  const [acoes, setAcoes] = useState('');

  useEffect(() => { setCriterios({}); }, [colabId]);

  if (ativos.length === 0) {
    return (
      <div className="max-w-3xl mx-auto px-4 py-10 text-center">
        <div className="bg-white rounded-2xl border-2 border-dashed border-bordo/20 p-10">
          <p className="font-display text-3xl text-bordo">CADASTRA UM COLABORADOR PRIMEIRO</p>
          <button onClick={() => setTab('colab')}
            className="mt-4 bg-vermelho text-amarelo font-display text-lg px-5 py-2.5 rounded-xl tracking-wider">
            IR PARA COLABORADORES
          </button>
        </div>
      </div>
    );
  }

  const todos = [...CRITERIOS_UNIVERSAIS, ...(CARGOS[colab?.cargo]?.criterios || [])];
  const preenchidos = todos.filter(c => criterios[c.id] !== undefined).length;
  const pct = todos.length ? Math.round((preenchidos / todos.length) * 100) : 0;
  const mediaParcial = preenchidos > 0
    ? Object.values(criterios).reduce((a,b) => a+b, 0) / preenchidos
    : 0;

  // Itens 4+8: para liderança, exige auto-avaliação concluída antes
  const exigeAuto = colab && ehLideranca(colab.cargo);
  const autoCompleta = (() => {
    if (!exigeAuto) return true;
    const auto = colab?.autoAvaliacaoPendente;
    if (!auto) return false;
    const todosCriterios = [...CRITERIOS_UNIVERSAIS, ...(CARGOS[colab.cargo]?.criterios || [])];
    return todosCriterios.every(c => typeof auto.criterios?.[c.id] === 'number');
  })();
  const bloqueado = exigeAuto && !autoCompleta;

  const setNota = (id, nota) => setCriterios(prev => ({ ...prev, [id]: nota }));

  const salvar = () => {
    if (preenchidos < todos.length) {
      if (!confirm(`Faltam ${todos.length - preenchidos} critérios sem nota. Salvar mesmo assim?`)) return;
    }
    const nova = {
      id: uid(),
      data,
      avaliador: avaliador.trim(),
      cargoNaEpoca: colab.cargo,
      criterios: { ...criterios },
      pontosFortes: pontosFortes.trim(),
      pontosFracos: pontosFracos.trim(),
      acoes: acoes.trim(),
      criadaEm: new Date().toISOString(),
    };
    dispatch({ type: 'ADD_AVAL', colabId: colab.id, payload: nova });
    setSelectedId(colab.id);
    setTab('colab');
  };

  return (
    <div className="max-w-4xl mx-auto px-4 py-6 space-y-5">
      <h1 className="font-display text-5xl text-bordo">NOVA AVALIAÇÃO</h1>

      <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5 space-y-3">
        <div className="grid md:grid-cols-3 gap-3">
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Colaborador *</label>
            <select value={colabId} onChange={e => setColabId(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho bg-white">
              {ativos.map(c => <option key={c.id} value={c.id}>{c.nome} — {c.cargo}{c.autoAvaliacaoPendente ? ' · 👤 c/ auto' : ''}</option>)}
            </select>
          </div>
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Data *</label>
            <input type="date" value={data} onChange={e => setData(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho" />
          </div>
          <div>
            <label className="text-xs uppercase font-bold text-bordo/70">Gestor avaliador</label>
            <input value={avaliador} onChange={e => setAvaliador(e.target.value)} placeholder="seu nome"
              className="w-full px-3 py-2 rounded-lg border-2 border-bordo/20 focus:border-vermelho" />
          </div>
        </div>

        {bloqueado && (
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4">
            <div className="flex items-start gap-3">
              <div className="text-3xl">🔒</div>
              <div className="flex-1">
                <div className="font-display text-xl text-red-800">AVALIAÇÃO BLOQUEADA</div>
                <p className="text-sm text-red-800/80 mt-1">
                  <strong>{colab.nome}</strong> ocupa cargo de liderança. Antes da sua avaliação, é obrigatório que ele(a) preencha a <strong>auto-avaliação completa</strong>. Isso permite calcular o gap de percepção corretamente.
                </p>
                <p className="text-sm text-red-800/80 mt-2">
                  📋 <strong>O que fazer:</strong> peça pra {colab.nome.split(' ')[0]} preencher primeiro. Tu pode iniciar pela aba <strong>Colaboradores → {colab.nome.split(' ')[0]} → Iniciar auto-avaliação</strong>.
                </p>
                {colab.autoAvaliacaoPendente && !autoCompleta && (
                  <p className="text-xs text-red-800/70 italic mt-2">
                    Auto-avaliação iniciada mas não concluída. Faltam critérios sem nota.
                  </p>
                )}
              </div>
            </div>
          </div>
        )}

function BlocoCriterios({ titulo, subtitulo, criterios, valores, setNota, notasAuto }) {
  return (
    <div className="bg-white rounded-2xl border-2 border-bordo/10 p-5">
      <h2 className="font-display text-2xl text-bordo">{titulo}</h2>
      <p className="text-bordo/60 text-sm mb-3">{subtitulo}</p>
      {criterios.map(c => (
        <CriterioInput key={c.id} criterio={c} valor={valores[c.id]}
          notaAuto={notasAuto?.[c.id]}
          onChange={(n) => setNota(c.id, n)} />
      ))}
    </div>
  );
}

function CriterioInput({ criterio, valor, notaAuto, onChange }) {
  const gap = (typeof valor === 'number' && typeof notaAuto === 'number') ? (valor - notaAuto) : null;
  let gapColor = 'bg-cinzaCDB text-bordo';
  if (gap !== null) {
    if (gap === 0) gapColor = 'bg-green-100 text-green-800';
    else if (Math.abs(gap) === 1) gapColor = 'bg-amber-100 text-amber-800';
    else gapColor = 'bg-red-100 text-red-800';
  }
  return (
    <div className="py-3 border-b border-bordo/10 last:border-0">
      <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
        <span className="text-bordo font-semibold flex-1 min-w-[60%]">{criterio.label}</span>
        <div className="flex items-center gap-2 text-xs">
          {typeof notaAuto === 'number' && (
            <span className="bg-azulCDB/30 text-bordo px-2 py-0.5 rounded font-bold" title="Auto-avaliação do colaborador">
              👤 {notaAuto}
            </span>
          )}
          {gap !== null && (
            <span className={`${gapColor} px-2 py-0.5 rounded font-bold`} title="Gap entre sua nota e a do colaborador">
              gap: {gap > 0 ? '+' : ''}{gap}
            </span>
          )}
          <span className="text-bordo/60">
            {valor !== undefined ? `${valor} · ${ESCALA_LABELS[valor]}` : 'sem nota'}
          </span>
        </div>
      </div>
      <div className="flex gap-1.5">
        {[1,2,3,4,5].map(n => (
          <button key={n} type="button" onClick={() => onChange(n)}
            className={`flex-1 py-2 rounded-lg font-display text-lg transition border-2 relative
              ${valor === n
                ? 'bg-vermelho text-amarelo border-bordo'
                : 'bg-cinzaCDB text-bordo border-transparent hover:border-vermelho'}`}>
            {n}
            {notaAuto === n && valor !== n && (
              <span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-azulCDB text-bordo text-[9px] font-bold flex items-center justify-center" title="Nota do colaborador">👤</span>
            )}
          </button>
        ))}
      </div>
    </div>
  );
}

/* =========================================================================
   11. APP RAIZ + REDUCER
   ========================================================================= */

function reducer(state, action) {
  switch (action.type) {
    case 'ADD_COLAB':
      return { ...state, colaboradores: [...state.colaboradores, action.payload] };
    case 'UPDATE_COLAB':
      return { ...state, colaboradores: state.colaboradores.map(c => c.id === action.payload.id ? { ...c, ...action.payload } : c) };
    case 'TOGGLE_ATIVO':
      return { ...state, colaboradores: state.colaboradores.map(c => c.id === action.id ? { ...c, ativo: !(c.ativo !== false) } : c) };
    case 'ADD_AVAL':
      // Se houver auto-avaliação pendente, embute na avaliação oficial e limpa
      return { ...state, colaboradores: state.colaboradores.map(c => {
        if (c.id !== action.colabId) return c;
        const aval = c.autoAvaliacaoPendente
          ? { ...action.payload, auto: c.autoAvaliacaoPendente }
          : action.payload;
        return { ...c, avaliacoes: [...(c.avaliacoes || []), aval], autoAvaliacaoPendente: null };
      }) };
    case 'DEL_AVAL':
      return { ...state, colaboradores: state.colaboradores.map(c =>
        c.id === action.colabId ? { ...c, avaliacoes: (c.avaliacoes || []).filter(a => a.id !== action.avalId) } : c) };
    case 'SAVE_AUTO':
      return { ...state, colaboradores: state.colaboradores.map(c =>
        c.id === action.colabId ? { ...c, autoAvaliacaoPendente: action.payload } : c) };
    case 'CLEAR_AUTO':
      return { ...state, colaboradores: state.colaboradores.map(c =>
        c.id === action.colabId ? { ...c, autoAvaliacaoPendente: null } : c) };
    case 'REPLACE_ALL':
      return action.payload;
    default:
      return state;
  }
}

/* =========================================================================
   COMPONENTE: SEÇÃO DE SINCRONIZAÇÃO COM GOOGLE SHEETS
   ========================================================================= */

function SecaoSyncSheets({ state, dispatch }) {
  const [url, setUrl] = useState(getSheetsUrl());
  const [editando, setEditando] = useState(!getSheetsUrl());
  const [status, setStatus] = useState('idle'); // idle | testing | ok | error
  const [errMsg, setErrMsg] = useState('');
  const [pulling, setPulling] = useState(false);
  const [pushing, setPushing] = useState(false);

  const conectado = !!getSheetsUrl();
  const ultimaSync = getLastSync();
  const pendente = isSyncPending();

  const salvarUrl = async () => {
    const limpa = url.trim();
    if (!limpa) {
      setSheetsUrl('');
      setEditando(true);
      setStatus('idle');
      return;
    }
    if (!limpa.includes('script.google.com') || !limpa.includes('/exec')) {
      setStatus('error');
      setErrMsg('A URL precisa ser do Apps Script (deve conter script.google.com/.../exec)');
      return;
    }
    setStatus('testing');
    setErrMsg('');
    try {
      // Testa GET — deve responder com algo válido
      const res = await fetch(limpa + '?action=read', { method: 'GET' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setSheetsUrl(limpa);
      setStatus('ok');
      setEditando(false);
    } catch (e) {
      setStatus('error');
      setErrMsg('Falha no teste: ' + e.message + '. Verifica se publicou como "Web App" e marcou acesso "Qualquer pessoa".');
    }
  };

  const desconectar = () => {
    if (!confirm('Desconectar do Sheets? Os dados continuam salvos localmente, mas param de sincronizar.')) return;
    setSheetsUrl('');
    setUrl('');
    setEditando(true);
    setStatus('idle');
  };

  const sincronizarAgora = async () => {
    setPushing(true);
    try {
      await pushToSheets(state);
      alert('✅ Sincronizado! Todos os dados estão na planilha agora.');
      // força re-render
      setStatus('ok');
    } catch (e) {
      alert('❌ Erro ao sincronizar: ' + e.message);
      markSyncPending();
    } finally {
      setPushing(false);
    }
  };

  const puxarDoSheets = async () => {
    if (!confirm('Puxar dados da planilha vai SUBSTITUIR os dados locais. Continuar?')) return;
    setPulling(true);
    try {
      const data = await pullFromSheets();
      if (!data || !data.colaboradores) throw new Error('Planilha sem dados válidos');
      dispatch({ type: 'REPLACE_ALL', payload: { colaboradores: data.colaboradores } });
      alert('✅ Dados puxados da planilha. ' + data.colaboradores.length + ' colaboradores carregados.');
    } catch (e) {
      alert('❌ Erro: ' + e.message);
    } finally {
      setPulling(false);
    }
  };

  if (!conectado || editando) {
    return (
      <section className="bg-white rounded-2xl border-2 border-azulCDB/40 p-5">
        <div className="flex items-center gap-2 mb-1">
          <span className="text-2xl">🔗</span>
          <h2 className="font-display text-2xl text-bordo">SINCRONIZAR COM GOOGLE SHEETS</h2>
        </div>
        <p className="text-bordo/70 text-sm mb-3">
          Conecta o app a uma planilha do Sheets via Apps Script. <strong>Todos os gestores que colarem a mesma URL veem os mesmos dados em tempo real.</strong>
        </p>

        <div className="bg-amarelo/30 border border-amarelo rounded-lg p-3 mb-3">
          <p className="text-xs text-bordo">
            <strong>Antes de colar a URL aqui</strong>, tu precisa: (1) criar uma planilha no Sheets, (2) abrir Apps Script, (3) colar o script que te enviei, (4) publicar como Web App. Tem o guia completo no arquivo <code>GUIA_SHEETS_SYNC.md</code>.
          </p>
        </div>

        <label className="text-xs uppercase font-bold text-bordo/70">URL do Apps Script (termina em /exec)</label>
        <input type="url" value={url} onChange={e => setUrl(e.target.value)}
          placeholder="https://script.google.com/macros/s/AKfycb.../exec"
          className="w-full px-3 py-2 mt-1 rounded-lg border-2 border-bordo/20 focus:border-azulCDB focus:outline-none font-mono text-xs" />

        {status === 'error' && (
          <div className="mt-2 bg-red-50 border border-red-300 rounded-lg p-2 text-xs text-red-800">
            ❌ {errMsg}
          </div>
        )}

        <div className="flex gap-2 mt-3">
          {conectado && <button onClick={() => setEditando(false)}
            className="px-4 py-2.5 border-2 border-bordo/30 text-bordo font-display tracking-wider rounded-xl text-sm">CANCELAR</button>}
          <button onClick={salvarUrl} disabled={status === 'testing'}
            className="flex-1 bg-azulCDB hover:bg-azulCDB/80 disabled:opacity-50 text-bordo font-display tracking-wider py-2.5 rounded-xl text-sm">
            {status === 'testing' ? 'TESTANDO...' : '🔌 CONECTAR'}
          </button>
        </div>
      </section>
    );
  }

  // Conectado
  return (
    <section className="bg-white rounded-2xl border-2 border-green-300 p-5">
      <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
        <div className="flex items-center gap-2">
          <span className="text-2xl">{pendente ? '⚠️' : '✅'}</span>
          <h2 className="font-display text-2xl text-bordo">SHEETS SYNC {pendente ? 'PENDENTE' : 'ATIVO'}</h2>
        </div>
        <button onClick={() => setEditando(true)}
          className="text-xs text-bordo/60 hover:text-bordo underline">trocar URL</button>
      </div>

      <p className="text-xs text-bordo/70 mb-3">
        {pendente
          ? '⚠️ Há mudanças locais ainda não sincronizadas. Toca "Sincronizar agora" pra enviar.'
          : ultimaSync
            ? `Última sincronização: ${new Date(ultimaSync).toLocaleString('pt-BR')}`
            : 'Conectado, mas ainda não sincronizou nada.'}
      </p>

      <div className="grid grid-cols-2 gap-2">
        <button onClick={sincronizarAgora} disabled={pushing}
          className="bg-green-600 hover:bg-green-700 disabled:opacity-50 text-white font-display tracking-wider py-2.5 rounded-xl text-sm">
          {pushing ? '⏳ SALVANDO...' : '⬆️ SALVAR NO SHEETS'}
        </button>
        <button onClick={puxarDoSheets} disabled={pulling}
          className="bg-bordo hover:bg-bordo/80 disabled:opacity-50 text-amarelo font-display tracking-wider py-2.5 rounded-xl text-sm">
          {pulling ? '⏳ PUXANDO...' : '⬇️ PUXAR DO SHEETS'}
        </button>
      </div>

      <button onClick={desconectar}
        className="w-full mt-2 text-xs text-red-700 hover:underline">
        Desconectar do Sheets
      </button>
    </section>
  );
}

          </p>
        </div>

        <label className="block text-amarelo text-xs uppercase font-bold tracking-wider mb-1">Senha do time</label>
        <input
          type="password"
          value={senha}
          onChange={e => setSenha(e.target.value)}
          autoFocus
          placeholder="••••••••"
          className="w-full px-4 py-3 rounded-xl bg-white text-bordo font-bold text-lg focus:outline-none focus:ring-4 focus:ring-amarelo/50"
        />

        {erro && (
          <div className="mt-3 bg-red-700 text-white text-sm rounded-lg px-3 py-2">
            ❌ {erro}
          </div>
        )}

        <button type="submit" disabled={carregando}
          className="w-full mt-4 bg-amarelo hover:bg-yellow-300 disabled:opacity-50 text-bordo font-display text-xl tracking-wider py-3 rounded-xl shadow-lg">
          {carregando ? '⏳ VERIFICANDO...' : '🔓 ENTRAR'}
        </button>

        <p className="text-center text-white/60 text-xs mt-4">
          Acesso protegido · 30 dias de sessão
        </p>
      </form>
    </div>
  );
}

function App() {
  const [nivel, setNivel] = useState(getNivelAtual);
  if (!nivel) {
    return <TelaLogin onSuccess={(n) => setNivel(n)} />;
  }
  return <AppPrincipal nivel={nivel} onLogout={() => { clearAuth(); setNivel(null); }} />;
}

function AppPrincipal({ nivel, onLogout }) {
  const [state, setState] = useState(loadState);
  const [tab, setTab] = useState('dashboard');
  const [selectedId, setSelectedId] = useState(null);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [toast, setToast] = useState(null);
  const stateRef = useRef(state);
  stateRef.current = state;

  const showToast = (msg, kind='success') => {
    setToast({ msg, kind, id: Date.now() });
    setTimeout(() => setToast(null), 2200);
  };

  useEffect(() => { saveState(state); }, [state]);

  useEffect(() => {
    if (!getSheetsUrl()) return;
    const fazerPull = async () => {
      setSyncStatus('syncing');
      try {
        const data = await pullFromSheets();
        if (data && data.colaboradores) {
          setState({ colaboradores: data.colaboradores });
        }
        setSyncStatus('ok');
      } catch {
        setSyncStatus('offline');
      }
    };
    fazerPull();
    const onVisible = () => { if (document.visibilityState === 'visible') fazerPull(); };
    document.addEventListener('visibilitychange', onVisible);
    return () => document.removeEventListener('visibilitychange', onVisible);
  }, []);

  const initialMount = useRef(true);
  useEffect(() => {
    if (initialMount.current) { initialMount.current = false; return; }
    if (!getSheetsUrl()) return;
    markSyncPending();
    setSyncStatus('syncing');
    const t = setTimeout(async () => {
      try {
        await pushToSheets(stateRef.current);
        setSyncStatus('ok');
        showToast('✅ Salvo no Sheets');
      } catch {
        setSyncStatus('offline');
        showToast('⚠️ Salvo apenas localmente', 'warning');
      }
    }, 1500);
    return () => clearTimeout(t);
  }, [state]);

  const dispatch = (action) => setState(prev => reducer(prev, action));

  return (
    <div className="min-h-screen paper-bg">
      <Header tab={tab} setTab={(t) => { setTab(t); if (t !== 'colab') setSelectedId(null); }}
        syncStatus={syncStatus} sheetsActive={!!getSheetsUrl()} onLogout={onLogout} nivel={nivel} />
      <main>
        {tab === 'dashboard' && <Dashboard state={state} setTab={setTab} setSelectedId={setSelectedId} nivel={nivel} />}
        {tab === 'colab'     && <ListaColaboradores state={state} dispatch={dispatch} selectedId={selectedId} setSelectedId={setSelectedId} setTab={setTab} nivel={nivel} />}
        {tab === 'avaliar'   && <NovaAvaliacao state={state} dispatch={dispatch} setTab={setTab} setSelectedId={setSelectedId} nivel={nivel} />}
        {tab === 'config'    && <Configuracoes state={state} dispatch={dispatch} onLogout={onLogout} nivel={nivel} />}
      </main>

      {toast && (
        <div key={toast.id} className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] pop-in
          ${toast.kind === 'warning' ? 'bg-amber-500 text-bordo' : 'bg-green-600 text-white'}
          font-display text-base px-5 py-3 rounded-2xl shadow-2xl tracking-wide`}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
